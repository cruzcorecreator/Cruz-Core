<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#050916"><title>GameHub — Users</title><link rel="stylesheet" href="ui.css"></head><body>
<section><div class="section-head"><div><h1 class="page-title">Users</h1><p class="muted">Follow, friend, message, block, and view profiles. Everything loads from Firebase.</p></div><input class="search" id="userSearch" placeholder="Search users..."></div><div class="grid layout-games"><main><div class="section-head"><h2>All Users</h2><span class="pill" id="userCount">0 users</span></div><div class="list" id="usersList"><div class="empty">loading users...</div></div></main><aside class="right-col"><section class="card card-pad"><h2>Private Messages</h2><div class="list" id="messagesList"><p class="muted">loading...</p></div></section><section class="card card-pad"><h2>Friend Requests</h2><div class="list" id="requestList"><p class="muted">none yet.</p></div></section></aside></div></section>

<div class="modal-lite" id="reportModal">
  <div class="modal-box">
    <h2 style="margin-top:0">Report</h2>
    <p class="muted" id="reportTargetText">Report this item.</p>
    <div class="field"><label>Reason</label><select id="reportReason" class="search"><option>spam</option><option>harassment</option><option>nsfw</option><option>impersonation</option><option>exploit</option><option>bypass</option><option>other</option></select></div>
    <div class="field"><label>Description</label><textarea id="reportDescription" maxlength="500" placeholder="Tell staff what happened..."></textarea></div>
    <div class="button-row"><button class="btn primary" id="submitReport" type="button">Submit Report</button><button class="btn" id="cancelReport" type="button">Cancel</button></div>
    <p class="muted" id="reportStatus"></p>
  </div>
</div>

<script src="login-guard.js"></script><script src="shell.js"></script><script>
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));let db,me,users={},presence={},following={},friends={},requests={},sent={},blocks={},blockedBy={},messages={};const rankEmoji=r=>({owner:'👑',tester:'🧪',admin:'🛡️',mod:'🔨',helper:'✨',bot:'🤖',banned:'🚫',member:''}[r]||'');const key=(a,b)=>[a,b].sort().join('__');function photo(u){return (window.FGAuth?.pickPhoto?.(u))||u?.photoURL||u?.pfp||u?.pfpUrl||u?.profilePic||u?.profilePicture||u?.profileImage||u?.avatar||u?.avatarUrl||u?.picture||u?.photo||u?.image||u?.icon||''}function avatar(u){const img=photo(u);return img?`<span class="avatar"><img src="${esc(img)}" alt=""></span>`:`<span class="avatar">${esc((u?.name||u?.username||'U').slice(0,1).toUpperCase())}</span>`}function blocked(uid){return blocks[uid]||blockedBy[uid]}function render(){const q=userSearch.value.toLowerCase();const list=Object.values(users).filter(u=>u&&u.uid&&u.uid!==me.uid&&(u.role||u.rank)!=='banned').filter(u=>[u.name,u.username,u.bio,u.role].join(' ').toLowerCase().includes(q)).sort((a,b)=>String(a.name||a.username).localeCompare(String(b.name||b.username)));userCount.textContent=list.length+' users';usersList.innerHTML=list.map(u=>{const uid=u.uid,p=presence[uid]||{},on=p.online&&Date.now()-Number(p.lastSeen||0)<90000;let actions=blocked(uid)?`<button class="btn" data-act="unblock" data-id="${esc(uid)}">Unblock</button>`:`<button class="btn" data-act="${following[uid]?'unfollow':'follow'}" data-id="${esc(uid)}">${following[uid]?'Unfollow':'Follow'}</button><button class="btn" data-act="message" data-id="${esc(uid)}">Message</button><button class="btn" data-act="block" data-id="${esc(uid)}">Block</button>`;if(!blocked(uid)){actions+=(friends[uid]?`<button class="btn" data-act="unfriend" data-id="${esc(uid)}">Unfriend</button>`:requests[uid]?`<button class="btn primary" data-act="accept" data-id="${esc(uid)}">Accept</button>`:sent[uid]?`<button class="btn" data-act="cancel" data-id="${esc(uid)}">Cancel request</button>`:`<button class="btn primary" data-act="friend" data-id="${esc(uid)}">Add friend</button>`)}actions+=`<button class="btn danger" data-act="report" data-id="${esc(uid)}">Report</button>`;return `<article class="person" style="grid-template-columns:auto 1fr"><a href="viewprofile.html?id=${encodeURIComponent(uid)}">${avatar(u)}</a><span><a href="viewprofile.html?id=${encodeURIComponent(uid)}"><b>${esc(u.name||u.username)} ${rankEmoji(u.role||u.rank)} <span class="rank">${esc(u.role||u.rank||'member')}</span></b></a><span>${on?'online · '+esc(p.currentPage||'active'):'offline'}${friends[uid]?' · friends':''}${blocked(uid)?' · blocked':''}</span><p class="muted" style="margin:7px 0">${esc(u.bio||'No bio yet.')}</p><span style="display:flex;gap:8px;flex-wrap:wrap">${actions}</span></span></article>`}).join('')||'<div class="empty">No users found.</div>';requestList.innerHTML=Object.keys(requests).map(uid=>`<div class="person">${avatar(users[uid]||{})}<span><b>${esc((users[uid]||{}).name||uid)}</b><span>wants to be friends</span></span><button class="btn primary" data-act="accept" data-id="${esc(uid)}">Accept</button></div>`).join('')||'<p class="muted">No friend requests.</p>'}function renderMessages(){const arr=Object.values(messages).sort((a,b)=>Number(b.lastAt||0)-Number(a.lastAt||0)).slice(0,12);messagesList.innerHTML=arr.map(m=>`<a class="person" href="messages.html?with=${encodeURIComponent(m.withUid||m.fromUid||'')}"><span class="avatar">💬</span><span><b>${esc(m.fromName||m.fromUsername||'user')}</b><span>${esc(m.lastText||'')}</span></span></a>`).join('')||'<p class="muted">No DMs yet.</p>'}async function follow(uid){await Promise.all([db.ref('siteSocial/following/'+me.uid+'/'+uid).set(true),db.ref('siteSocial/followers/'+uid+'/'+me.uid).set(true)])}async function unfollow(uid){await Promise.all([db.ref('siteSocial/following/'+me.uid+'/'+uid).remove(),db.ref('siteSocial/followers/'+uid+'/'+me.uid).remove()])}async function friend(uid){await Promise.all([db.ref('siteSocial/friendRequests/'+uid+'/'+me.uid).set({uid:me.uid,username:me.username,name:me.name,createdAt:Date.now()}),db.ref('siteSocial/friendRequestsSent/'+me.uid+'/'+uid).set(true)])}async function accept(uid){await Promise.all([db.ref('siteSocial/friends/'+me.uid+'/'+uid).set(true),db.ref('siteSocial/friends/'+uid+'/'+me.uid).set(true),db.ref('siteSocial/friendRequests/'+me.uid+'/'+uid).remove(),db.ref('siteSocial/friendRequestsSent/'+uid+'/'+me.uid).remove()])}async function block(uid){await Promise.all([db.ref('siteSocial/blocks/'+me.uid+'/'+uid).set(true),db.ref('siteSocial/blockedBy/'+uid+'/'+me.uid).set(true)])}async function unblock(uid){await Promise.all([db.ref('siteSocial/blocks/'+me.uid+'/'+uid).remove(),db.ref('siteSocial/blockedBy/'+uid+'/'+me.uid).remove()])}async function message(uid){if(blockedBy[uid])return alert('You cannot message this user.');location.href='messages.html?with='+encodeURIComponent(uid);}document.addEventListener('fg-auth-ready',async()=>{me=window.FGUser;await FGAuth.initFirebase();db=FGAuth.db();['siteUsers','sitePresence'].forEach(path=>db.ref(path).on('value',s=>{if(path==='siteUsers')users=s.val()||{};else presence=s.val()||{};render()}));db.ref('siteSocial/following/'+me.uid).on('value',s=>{following=s.val()||{};render()});db.ref('siteSocial/friends/'+me.uid).on('value',s=>{friends=s.val()||{};render()});db.ref('siteSocial/friendRequests/'+me.uid).on('value',s=>{requests=s.val()||{};render()});db.ref('siteSocial/friendRequestsSent/'+me.uid).on('value',s=>{sent=s.val()||{};render()});db.ref('siteSocial/blocks/'+me.uid).on('value',s=>{blocks=s.val()||{};render()});db.ref('siteSocial/blockedBy/'+me.uid).on('value',s=>{blockedBy=s.val()||{};render()});db.ref('siteDMIndex/'+me.uid).on('value',s=>{messages=s.val()||{};renderMessages()});});userSearch.oninput=render;document.addEventListener('click',async e=>{const b=e.target.closest('[data-act]');if(!b)return;const a=b.dataset.act,uid=b.dataset.id;if(a==='follow')await follow(uid);if(a==='unfollow')await unfollow(uid);if(a==='friend')await friend(uid);if(a==='accept')await accept(uid);if(a==='block')await block(uid);if(a==='unblock')await unblock(uid);if(a==='message')await message(uid);if(a==='report'){const u=users[uid]||{};openReportModal({type:'user',targetUid:uid,targetUsername:u.username||'',targetName:u.name||u.username||uid,context:'users page'});return;}if(a==='cancel')await db.ref('siteSocial/friendRequestsSent/'+me.uid+'/'+uid).remove();if(a==='unfriend')await Promise.all([db.ref('siteSocial/friends/'+me.uid+'/'+uid).remove(),db.ref('siteSocial/friends/'+uid+'/'+me.uid).remove()]);});
</script>
<script>
(function(){
  let currentReport=null, reportDb=null;
  function escReport(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
  async function getReportDb(){if(reportDb)return reportDb;await FGAuth.initFirebase();reportDb=FGAuth.db();return reportDb;}
  window.openReportModal=function(data){
    currentReport=data||{};
    const modal=document.getElementById('reportModal');
    const text=document.getElementById('reportTargetText');
    const status=document.getElementById('reportStatus');
    if(text)text.textContent='Reporting '+(currentReport.targetName||currentReport.targetUsername||currentReport.targetUid||currentReport.targetId||currentReport.type||'item');
    if(status)status.textContent='';
    if(document.getElementById('reportDescription'))reportDescription.value='';
    modal?.classList.add('open');
  };
  async function submitReport(){
    if(!currentReport)return;
    const db=await getReportDb();
    const me=window.FGUser||{};
    const payload={
      ...currentReport,
      reason:document.getElementById('reportReason')?.value||'other',
      description:(document.getElementById('reportDescription')?.value||'').trim(),
      status:'open',
      reporterUid:me.uid||'',
      reporterUsername:me.username||'',
      reporterName:me.name||me.username||'',
      by:me.uid||'',
      byName:me.name||me.username||'',
      createdAt:Date.now()
    };
    await db.ref('siteReports').push(payload);
    if(document.getElementById('reportStatus'))reportStatus.textContent='Report sent.';
    setTimeout(()=>document.getElementById('reportModal')?.classList.remove('open'),600);
  }
  document.addEventListener('click',e=>{
    if(e.target?.id==='cancelReport')document.getElementById('reportModal')?.classList.remove('open');
    if(e.target?.id==='submitReport')submitReport();
    if(e.target===document.getElementById('reportModal'))document.getElementById('reportModal')?.classList.remove('open');
  });
})();
</script>
</body></html>
