<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#050916"><title>GameHub — Home</title><link rel="stylesheet" href="ui.css"></head><body>
<section class="grid layout-home"><div><section class="hero"><p class="muted">Welcome back,</p><h1 id="welcomeName">player</h1><p id="heroCopy">Loading your game hub...</p><p><a class="btn primary" href="games.html">Browse Games</a> <a class="btn" href="messages.html">Messages</a></p></section><div class="section-head"><h2>Most Played Games</h2><a class="btn" href="games.html">View All</a></div><div class="game-row" id="featuredGames"><div class="empty">loading games...</div></div><div class="section-head"><h2>Continue Playing</h2></div><div class="game-row" id="continueGames"></div><div class="section-head"><h2>Recently Played</h2></div><div class="game-row" id="recentGames"></div></div><aside class="right-col"><section class="card card-pad"><h2>Friends Online</h2><div class="list" id="friendsOnline"><div class="empty">loading users...</div></div></section><section class="card card-pad"><h2>Announcements</h2><div class="list" id="announcements"><p class="muted">No announcements right now.</p></div></section></aside></section>
<script src="login-guard.js"></script><script src="shell.js"></script><script>
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));let db,games={},users={},presence={},stats={};function playable(g){return g&&g.id&&g.title&&!g.hidden&&!g.locked}function gameUrl(g){return g.openMode==='redirect'?(g.embedUrl||g.sourceUrl||'#'):'game.html?id='+encodeURIComponent(g.id)}function gameCard(g){const url=gameUrl(g);const art=g.thumbnailUrl?`<img src="${esc(g.thumbnailUrl)}" alt="">`:esc((g.thumbText||g.title||'G').slice(0,2).toUpperCase());const plays=Number(stats[g.id]?.plays||g.playCount||0);return `<a class="game-card" href="${esc(url)}" data-game-id="${esc(g.id)}"><div class="game-art">${art}</div><div class="game-info"><b>${esc(g.title)}</b><div class="game-meta"><span>${plays.toLocaleString()} plays</span><span>▶ play</span></div></div></a>`}function av(u){return u?.photoURL?`<span class="avatar"><img src="${esc(u.photoURL)}" alt=""></span>`:`<span class="avatar">${esc((u?.name||u?.username||'U').slice(0,1).toUpperCase())}</span>`}function person(u,p){return `<a class="person" href="viewprofile.html?id=${encodeURIComponent(u.uid)}">${av(u)}<span><b>${esc(u.name||u.username)}</b><span>${esc(p?.currentPage||'online')}</span></span><span class="status-dot"></span></a>`}function render(){const me=window.FGUser||{};welcomeName.textContent=(me.name||me.username||'player')+(me.role==='owner'?' 👑':'');heroCopy.textContent='Ready to play something awesome? Everything here loads live from Firebase.';let list=Object.values(games).filter(playable);const byPlays=[...list].sort((a,b)=>Number(stats[b.id]?.plays||b.playCount||0)-Number(stats[a.id]?.plays||a.playCount||0)||String(a.title).localeCompare(String(b.title)));featuredGames.innerHTML=byPlays.slice(0,5).map(gameCard).join('')||'<div class="empty">No games in Firebase yet.</div>';const recent=(me.recentGames||[]).slice(0,10).map(r=>games[r.id]||{...r,title:r.title||r.id,id:r.id,thumbnailUrl:r.thumbnailUrl});continueGames.innerHTML=recent.slice(0,3).map(gameCard).join('')||'<div class="empty">Play a game and it will show here.</div>';recentGames.innerHTML=recent.map(gameCard).join('')||'<div class="empty">No recently played games yet.</div>';const online=Object.values(presence).filter(p=>p&&p.online&&Date.now()-Number(p.lastSeen||0)<90000&&p.uid!==me.uid);friendsOnline.innerHTML=online.slice(0,8).map(p=>person(users[p.uid]||p,p)).join('')||'<p class="muted">Nobody else online.</p>'}async function awardGameLevel(id,amount=1){
  const me=window.FGUser;
  if(!db||!me?.uid)return;
  const nextLevel=Number(me.level||0)+amount;
  const nextActive=Number(me.activeSeconds||0)+(amount*60);
  me.level=nextLevel;
  me.activeSeconds=nextActive;
  localStorage.setItem('fg.user.v4',JSON.stringify(me));
  localStorage.setItem('fg.user.v3',JSON.stringify(me));
  try{
    await db.ref('siteUsers/'+me.uid).update({level:nextLevel,activeSeconds:nextActive,lastLevelUpAt:Date.now(),lastLevelGame:id});
    window.FGAuth?.showNotice?.('Level up! You are now level '+nextLevel+'.');
  }catch(e){console.warn('level award failed',e)}
}
async function recordPlay(id){const me=window.FGUser,g=games[id];if(!db||!me?.uid||!g)return;const rec={id:g.id,title:g.title,url:gameUrl(g),thumbnailUrl:g.thumbnailUrl||'',playedAt:Date.now()};const recent=[rec,...((me.recentGames||[]).filter(x=>x&&x.id!==id))].slice(0,10);me.recentGames=recent;localStorage.setItem('fg.user.v4',JSON.stringify(me));localStorage.setItem('fg.user.v3',JSON.stringify(me));try{await db.ref('siteUsers/'+me.uid).update({recentGames:recent,currentGame:id,lastPlayedAt:Date.now()});await db.ref('homepageAdmin/gameStats/'+id+'/plays').transaction(v=>(Number(v)||0)+1);await db.ref('homepageAdmin/games/'+id+'/playCount').transaction(v=>(Number(v)||0)+1);await awardGameLevel(id,1);}catch(e){console.warn(e)}}document.addEventListener('fg-auth-ready',async()=>{await FGAuth.initFirebase();db=FGAuth.db();db.ref('homepageAdmin/games').on('value',s=>{games=s.val()||{};render()});db.ref('homepageAdmin/gameStats').on('value',s=>{stats=s.val()||{};render()});db.ref('siteUsers').on('value',s=>{users=s.val()||{};render()});db.ref('sitePresence').on('value',s=>{presence=s.val()||{};render()});db.ref('siteAnnouncements/current').on('value',s=>{const a=s.val();announcements.innerHTML=a&&a.text?`<div class="card card-pad"><b>${esc(a.title||'Announcement')}</b><p class="muted">${esc(a.text)}</p></div>`:'<p class="muted">No announcements right now.</p>'});render();});document.addEventListener('click',async e=>{const a=e.target.closest('a[data-game-id]');if(!a)return;e.preventDefault();const href=a.getAttribute('href');await Promise.race([recordPlay(a.dataset.gameId),new Promise(r=>setTimeout(r,450))]);location.href=href;});
</script></body></html>
