<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fun and games</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #d8e0d4;
      --border: #7a7677;
      --white: #f5f5f5;
      --blue: #36abf5;
      --duck: #a8dc09;
      --wordle: #71b167;
      --minecraft: #4f9021;
      --brown: #a77d3c;
      --black: #000000;
      --lavender: #5d49d9;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Georgia, "Times New Roman", serif;
      color: #000;
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 1700px;
      margin: 0 auto;
      padding: 34px 34px 22px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 360px 1fr 280px;
      align-items: start;
      gap: 22px;
      margin-bottom: 18px;
    }

    .pill-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 92px;
      border: 6px solid var(--border);
      border-radius: 999px;
      background: var(--white);
      color: #000;
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.04em;
      box-shadow: none;
    }

    .pill-btn.chatbox {
      background: var(--blue);
    }

    .site-title {
      margin: 0;
      text-align: center;
      font-size: clamp(4rem, 6vw, 6.2rem);
      line-height: 0.9;
      font-weight: 700;
      letter-spacing: -0.05em;
    }

    .pages {
      position: relative;
      min-height: 700px;
    }

    .games-page {
      display: none;
    }

    .games-page.active {
      display: block;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 38px 38px;
    }

    .card {
      min-height: 204px;
      border: 6px solid var(--border);
      border-radius: 42px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      padding: 18px 30px;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }

    .thumb {
      width: 175px;
      height: 150px;
      flex: 0 0 175px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 26px;
      position: relative;
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .label {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
      text-transform: lowercase;
    }

    .duckmath { background: var(--duck); }
    .duckmath .thumb::before {
      content: "";
      position: absolute;
      width: 108px;
      height: 78px;
      background: rgba(200, 255, 78, 0.5);
      border-radius: 999px;
      left: 14px;
      bottom: 8px;
    }
    .duckmath .thumb img { position: relative; z-index: 1; }

    .wordle { background: var(--wordle); }
    .wordle .thumb {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 8rem;
      font-weight: 800;
      color: #f1f1f1;
      justify-content: flex-start;
      padding-left: 18px;
    }

    .minecraft { background: var(--minecraft); }
    .minecraft .thumb img,
    .fnaf .thumb img,
    .subway .thumb img,
    .lvl .thumb img { object-fit: cover; }

    .plinko,
    .fnaf { background: #000; }
    .plinko .thumb,
    .fnaf .thumb { width: 190px; flex-basis: 190px; }
    .plinko .thumb-text {
      font-family: "Brush Script MT", "Segoe Script", cursive;
      font-size: 5.1rem;
      color: #fff;
      line-height: 1;
      transform: rotate(-4deg);
      white-space: nowrap;
    }
    .plinko .label,
    .fnaf .label { color: #797579; }

    .snow { background: var(--brown); }
    .renweb,
    .chatgpt,
    .neal,
    .poki,
    .soundboard { background: var(--white); }

    .renweb .thumb img,
    .chatgpt .thumb img,
    .neal .thumb img,
    .poki .thumb img,
    .soundboard .thumb img { object-fit: contain; }

    .lvl { background: var(--lavender); }
    .ragdoll { background: #f2d36c; }
    .ragdoll .thumb img { object-fit: cover; }
    .doodle { background: #f5f0c9; }
    .doodle .thumb {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 4.6rem;
      font-weight: 900;
      color: #2f7d32;
      justify-content: center;
    }
    .geometry { background: #2fd0da; }
    .geometry .thumb {
      gap: 10px;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
    }
    .geometry .thumb span {
      width: 34px;
      height: 34px;
      background: #fff;
      display: block;
      transform: rotate(45deg);
      border: 4px solid #000;
    }


    .page-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 26px;
      margin-top: 18px;
      user-select: none;
    }

    .nav-arrow {
      border: none;
      background: transparent;
      color: #000;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 4.3rem;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }

    .page-indicator {
      font-size: 3.1rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    @media (max-width: 1200px) {
      .topbar {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .games-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      .page-wrap { padding: 20px 14px 20px; }
      .pill-btn { width: 100%; max-width: 360px; font-size: 1.6rem; height: 76px; }
      .games-grid { grid-template-columns: 1fr; gap: 20px; }
      .card { min-height: 150px; border-radius: 28px; padding: 14px 18px; }
      .thumb, .plinko .thumb, .fnaf .thumb { width: 110px; height: 100px; flex-basis: 110px; margin-right: 16px; }
      .wordle .thumb { font-size: 5rem; padding-left: 8px; }
      .label { font-size: 1.6rem; }
      .page-indicator { font-size: 2.2rem; }
      .nav-arrow { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <header class="topbar">
      <a class="pill-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSe89iu2REXajdvhOfnjQLso4zF0EjAXQAud3Ha9CIE8BrQtoQ/viewform?usp=dialog">request a game</a>
      <h1 class="site-title">fun and games</h1>
      <a class="pill-btn chatbox" href="chatbox.html">chatbox</a>
    </header>

    <div class="pages">
      <section class="games-page" data-page="1">
        <div class="games-grid">
          <a class="card duckmath" href="https://resources.a.staticdata.top/" aria-label="duckmath">
            <div class="thumb"><img src="https://duck-math.freetls.fastly.net/imgs/duck.webp" alt="Duckmath"></div>
            <div class="label">duckmath</div>
          </a>

          <a class="card wordle" href="wordle.html" aria-label="wordle">
            <div class="thumb">W</div>
            <div class="label">wordle</div>
          </a>

          <a class="card minecraft" href="https://classroomlesson.github.io/basic-ruffle-player/html/minecraft/duckcraft/duckcraft-v1.html" aria-label="minecraft">
            <div class="thumb"><img src="https://i.imgur.com/nKsYRdJ.png" alt="Minecraft"></div>
            <div class="label">minecraft</div>
          </a>

          <a class="card plinko" href="https://plinko-game-online.github.io/" aria-label="plinko">
            <div class="thumb"><div class="thumb-text">Plinko</div></div>
            <div class="label">plinko</div>
          </a>

          <a class="card snow" href="https://itsvijaysingh.github.io/Snow-Rider3D/" aria-label="snow rider">
            <div class="thumb"><img src="https://merlot.org/merlot/getMaterialImage.htm?id=773417944" alt="Snow Rider 3D"></div>
            <div class="label">snow rider</div>
          </a>

          <a class="card renweb" href="https://familyportal.renweb.com" aria-label="renweb">
            <div class="thumb"><img src="https://p.kindpng.com/picc/s/594-5943254_facts-facts-renweb-hd-png-download.png" alt="RenWeb"></div>
            <div class="label">renweb</div>
          </a>

          <a class="card fnaf" href="https://algebraschoolstudy.github.io/SchoolStudyGuidesList/1/index.html" aria-label="fnaf 1">
            <div class="thumb"><img src="https://image.api.playstation.com/gs2-sec/appkgo/prod/CUSA18362_00/1/i_cd6a177c374f229f9cd8e1164a78d49f78af97820747d480daf8cdd3e965c248/i/icon0.png" alt="FNAF 1"></div>
            <div class="label">fnaf 1</div>
          </a>

          <a class="card chatgpt" href="chatgpt.html" aria-label="chatgpt">
            <div class="thumb"><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" alt="ChatGPT"></div>
            <div class="label">ai chatbot</div>
          </a>

          <a class="card neal" href="https://neal.fun" aria-label="neal.fun">
            <div class="thumb"><img src="https://cdn.buymeacoffee.com/uploads/profile_pictures/2025/10/IG9EK8jZj0v2CEW4.png@300w_0e.webp" alt="neal.fun"></div>
            <div class="label">neal.fun</div>
          </a>
        </div>
      </section>

      <section class="games-page active" data-page="2">
        <div class="games-grid">
          <a class="card poki" href="construction.html" aria-label="poki">
            <div class="thumb"><img src="https://play-lh.googleusercontent.com/FBwBJqAv2KjTXRDRaEkrY3r2PJUWZbru1Y-6VyQY4Sku776mLJ2fIh1nMqzsmGdXUPI=w240-h480-rw" alt="Poki"></div>
            <div class="label">poki</div>
          </a>

          <a class="card soundboard" href="https://soundinstants.com" aria-label="soundboard">
            <div class="thumb"><img src="https://upload.wikimedia.org/wikipedia/commons/2/21/Speaker_Icon.svg" alt="Soundboard"></div>
            <div class="label">soundboard</div>
          </a>

          <a class="card subway" href="http://subwaysurfers76.github.io" aria-label="subway surfers">
            <div class="thumb"><img src="https://img.poki-cdn.com/cdn-cgi/image/q=78,scq=50,width=1200,height=1200,fit=cover,f=png/7f4c7dc492227ec127a47e4b3197754e/subway-surfers.png" alt="Subway Surfers"></div>
            <div class="label">subway surfers</div>
          </a>

          <a class="card ragdoll" href="ragdoll.html" aria-label="ragdoll hit">
            <div class="thumb"><img src="https://img.poki-cdn.com/cdn-cgi/image/q=78,scq=50,width=1200,height=1200,fit=cover,f=png/3c892779be9dabb3589586c83ad3eeed/ragdoll-hit.png" alt="Ragdoll Hit"></div>
            <div class="label">ragdoll hit</div>
          </a>

          <a class="card doodle" href="doodle.html" aria-label="doodle jump">
            <div class="thumb">dood</div>
            <div class="label">doodle jump</div>
          </a>

          <a class="card geometry" href="dash.html" aria-label="geometry dash">
            <div class="thumb"><span></span><span></span><span></span><span></span></div>
            <div class="label">geometry dash</div>
          </a>
        </div>
      </section>
    </div>

    <div class="page-nav">
      <button class="nav-arrow" id="prevBtn" aria-label="Previous page">←</button>
      <div class="page-indicator" id="pageIndicator">page 2</div>
      <button class="nav-arrow" id="nextBtn" aria-label="Next page">→</button>
    </div>
  </div>

  <script>
    (() => {
      const pages = [...document.querySelectorAll('.games-page')];
      const indicator = document.getElementById('pageIndicator');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      let currentPage = 0;

      function renderPage() {
        pages.forEach((page, index) => {
          page.classList.toggle('active', index === currentPage);
        });
        indicator.textContent = `page ${currentPage + 1}`;
      }

      prevBtn.addEventListener('click', () => {
        currentPage = (currentPage - 1 + pages.length) % pages.length;
        renderPage();
      });

      nextBtn.addEventListener('click', () => {
        currentPage = (currentPage + 1) % pages.length;
        renderPage();
      });

      renderPage();
    })();
  </script>


</body></html>
