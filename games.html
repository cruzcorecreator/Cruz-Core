<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#050916"><title>GameHub — Games</title><link rel="stylesheet" href="ui.css"></head><body>
<section class="grid layout-games"><main><div class="section-head"><div><h1 class="page-title">Games</h1><p class="muted">Discover and play games imported from Firebase.</p></div><input class="search" id="gameSearch" placeholder="Search in games..."></div><div class="section-head"><h2>All Games</h2><span class="pill" id="gameCount">0 games</span></div><div class="game-row" id="gamesGrid"><div class="empty">loading games...</div></div></main><aside class="right-col"><section class="card card-pad"><h2>Friends Online</h2><div class="list" id="friendsOnline"><p class="muted">loading...</p></div></section><section class="card card-pad"><h2>Top Played</h2><div class="list" id="topPlayed"><p class="muted">loading...</p></div></section><section class="card card-pad"><h2>Request a Game</h2><p class="muted">Ask staff to add a game.</p><div class="field"><label>Game Name</label><input id="requestGameTitle" placeholder="game name"></div><div class="field"><label>Game Link</label><input id="requestGameUrl" placeholder="https://..."></div><div class="field"><label>Why add it?</label><textarea id="requestGameReason" placeholder="why should this be added?"></textarea></div><button class="btn primary" id="submitGameRequest" type="button">Submit Request</button><p class="muted" id="requestGameStatus">ready</p></section></aside></section>
<script src="login-guard.js"></script><script src="shell.js"></script><script>
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));let db,games={},presence={},users={},stats={};function playable(g){return g&&g.id&&g.title&&!g.hidden&&!g.locked}function gameUrl(g){return g.openMode==='redirect'?(g.embedUrl||g.sourceUrl||'#'):'game.html?id='+encodeURIComponent(g.id)}
function normalizeSearch(s=''){
  return String(s).toLowerCase().trim().replace(/\s+/g,' ');
}

function searchScore(game, query){
  const q = normalizeSearch(query);
  if(!q) return 0;

  const title = normalizeSearch(game.title || '');
  const tags = normalizeSearch((game.tags || []).join(' '));
  const desc = normalizeSearch(game.description || '');

  if(title === q) return 1000;

  // Title starts with query
  if(title.startsWith(q)) return 900 - (title.length * 0.01);

  // Any word starts with query
  const words = title.split(' ');
  if(words.some(w => w.startsWith(q))) return 750;

  // Strong contains in title
  if(title.includes(q)) return 600;

  // Tags start with query
  if(tags.split(' ').some(w => w.startsWith(q))) return 450;

  // Tags contains query
  if(tags.includes(q)) return 350;

  // Description contains query
  if(desc.includes(q)) return 200;

  return -1;
}
function card(g){const url=gameUrl(g);const art=g.thumbnailUrl?`<img src="${esc(g.thumbnailUrl)}" alt="">`:esc((g.thumbText||g.title||'G').slice(0,2).toUpperCase());const plays=Number(stats[g.id]?.plays||g.playCount||0);return `<a class="game-card" href="${esc(url)}" data-game-id="${esc(g.id)}"><div class="game-art">${art}</div><div class="game-info"><b>${esc(g.title)}</b><div class="game-meta"><span>${esc(g.tag||g.type||'game')}</span><span>${plays.toLocaleString()} plays</span></div></div></a>`}function av(u){return u?.photoURL?`<span class="avatar"><img src="${esc(u.photoURL)}" alt=""></span>`:`<span class="avatar">${esc((u?.name||u?.username||'U').slice(0,1).toUpperCase())}</span>`}function render(){const q=(gameSearch.value||new URLSearchParams(location.search).get('q')||'').toLowerCase();if(!gameSearch.value&&q)gameSearch.value=q;let list=Object.values(games).filter(playable);if(q)list=list.filter(g=>[g.title,g.description,g.tag,g.type].join(' ').toLowerCase().includes(q));list.sort((a,b)=>(+a.page||1)-(+b.page||1)||(+a.order||0)-(+b.order||0));gameCount.textContent=list.length+' game'+(list.length===1?'':'s');gamesGrid.innerHTML=list.map(card).join('')||'<div class="empty">No games match.</div>';const online=Object.values(presence).filter(p=>p&&p.online&&Date.now()-Number(p.lastSeen||0)<90000).slice(0,6);friendsOnline.innerHTML=online.map(p=>{const u=users[p.uid]||p;return `<a class="person" href="viewprofile.html?id=${encodeURIComponent(p.uid)}">${av(u)}<span><b>${esc(u.name||u.username||p.name)}</b><span>${esc(p.currentPage||'online')}</span></span><span class="status-dot"></span></a>`}).join('')||'<p class="muted">Nobody online.</p>';const top=[...Object.values(games).filter(playable)].sort((a,b)=>Number(stats[b.id]?.plays||b.playCount||0)-Number(stats[a.id]?.plays||a.playCount||0)).slice(0,6);topPlayed.innerHTML=top.map(g=>`<a class="person" href="${esc(gameUrl(g))}" data-game-id="${esc(g.id)}"><span class="avatar">🎮</span><span><b>${esc(g.title)}</b><span>${Number(stats[g.id]?.plays||g.playCount||0).toLocaleString()} plays</span></span></a>`).join('')||'<p class="muted">No plays tracked yet.</p>'}async function awardGameLevel(id,amount=1){
  const me=window.FGUser;
  if(!db||!me?.uid)return;
  const nextLevel=Number(me.level||0)+amount;
  const nextActive=Number(me.activeSeconds||0)+(amount*60);
  me.level=nextLevel;
  me.activeSeconds=nextActive;
  localStorage.setItem('fg.user.v4',JSON.stringify(me));
  localStorage.setItem('fg.user.v3',JSON.stringify(me));
  try{
    await db.ref('siteUsers/'+me.uid).update({level:nextLevel,activeSeconds:nextActive,lastLevelUpAt:Date.now(),lastLevelGame:id});
    window.FGAuth?.showNotice?.('Level up! You are now level '+nextLevel+'.');
  }catch(e){console.warn('level award failed',e)}
}
async function recordPlay(id){const me=window.FGUser,g=games[id];if(!db||!me?.uid||!g)return;const rec={id:g.id,title:g.title,url:gameUrl(g),thumbnailUrl:g.thumbnailUrl||'',playedAt:Date.now()};const recent=[rec,...((me.recentGames||[]).filter(x=>x&&x.id!==id))].slice(0,10);me.recentGames=recent;localStorage.setItem('fg.user.v4',JSON.stringify(me));localStorage.setItem('fg.user.v3',JSON.stringify(me));try{await db.ref('siteUsers/'+me.uid).update({recentGames:recent,currentGame:id,lastPlayedAt:Date.now()});await db.ref('homepageAdmin/gameStats/'+id+'/plays').transaction(v=>(Number(v)||0)+1);await db.ref('homepageAdmin/games/'+id+'/playCount').transaction(v=>(Number(v)||0)+1);await awardGameLevel(id,1);}catch(e){console.warn(e)}}
async function submitGameRequestNow(){
  const title=(requestGameTitle?.value||'').trim();
  const url=(requestGameUrl?.value||'').trim();
  const reason=(requestGameReason?.value||'').trim();
  if(!title){requestGameStatus.textContent='Game name required.';return}
  if(!db){try{await FGAuth.initFirebase();db=FGAuth.db();}catch(e){requestGameStatus.textContent='Firebase not ready yet.';return}}
  const me=window.FGUser||{};
  await db.ref('siteGameRequests').push({
    title:title.slice(0,80),
    url:url.slice(0,300),
    reason:reason.slice(0,500),
    status:'open',
    by:me.uid||'',
    byName:me.name||me.username||'unknown',
    byUsername:me.username||'',
    createdAt:Date.now()
  });
  requestGameTitle.value='';
  requestGameUrl.value='';
  requestGameReason.value='';
  requestGameStatus.textContent='request sent';
}

document.addEventListener('fg-auth-ready',async()=>{await FGAuth.initFirebase();db=FGAuth.db();db.ref('homepageAdmin/games').on('value',s=>{games=s.val()||{};render()});db.ref('homepageAdmin/gameStats').on('value',s=>{stats=s.val()||{};render()});db.ref('siteUsers').on('value',s=>{users=s.val()||{};render()});db.ref('sitePresence').on('value',s=>{presence=s.val()||{};render()});});gameSearch.oninput = e => {
  q = e.target.value || '';

  // Do NOT force-reset the field from URL params.
  // Update URL cleanly instead.
  const clean = q.trim();

  if(clean){
    history.replaceState({}, '', 'games.html?q=' + encodeURIComponent(clean));
  } else {
    history.replaceState({}, '', 'games.html');
  }

  render();
};document.addEventListener('click',async e=>{const a=e.target.closest('a[data-game-id]');if(!a)return;e.preventDefault();const href=a.getAttribute('href');await Promise.race([recordPlay(a.dataset.gameId),new Promise(r=>setTimeout(r,450))]);location.href=href;});

document.addEventListener('click',e=>{
  const btn=e.target.closest('#submitGameRequest');
  if(btn){
    e.preventDefault();
    submitGameRequestNow();
  }
});

</script></body></html>
