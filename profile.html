<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#050916"><title>GameHub — Profile</title><link rel="stylesheet" href="ui.css"></head><body>
<section class="grid layout-games"><main><section class="profile-hero"><div class="avatar big-avatar" id="avatar">P</div><div><h1 class="page-title" id="nameText">profile</h1><p class="muted" id="bioText">Customize your account.</p><span class="rank" id="roleText">member</span></div></section><section class="card card-pad" style="margin-top:16px"><h2>Edit Profile</h2><div class="field"><label>Display name</label><input id="displayName" maxlength="24"></div><div class="field"><label>Upload profile picture</label><input id="pfpFile" type="file" accept="image/*"></div><div class="field"><label>Or paste image URL</label><input id="pfpUrl" placeholder="https://... image link"></div><div class="field"><label>Bio</label><textarea id="bio" maxlength="260"></textarea></div><button class="btn primary" id="saveProfile" type="button">Save Profile</button> <button class="btn" id="removePfp" type="button">Remove PFP</button><p class="muted" id="status">ready</p></section></main><aside class="right-col"><section class="card card-pad"><h2>Recently Played</h2><div class="list" id="recentGames"></div></section><section class="card card-pad"><h2>Account</h2><div class="list" id="stats"></div></section></aside></section>
<script src="login-guard.js"></script><script src="shell.js"></script><script>
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));let uploadedData='';function pfp(u){return (window.FGAuth?.pickPhoto?.(u))||u?.photoURL||u?.pfp||u?.pfpUrl||u?.profilePic||u?.profilePicture||u?.profileImage||u?.avatar||u?.avatarUrl||u?.picture||u?.photo||u?.image||u?.icon||''}function fill(){const u=window.FGUser||{},img=pfp(u);nameText.textContent=u.name||u.username||'player';bioText.textContent=u.bio||'No bio yet.';roleText.textContent=u.role||u.rank||'member';displayName.value=u.name||'';pfpUrl.value=img&&String(img).startsWith('http')?img:'';bio.value=u.bio||'';avatar.innerHTML=img?`<img src="${esc(img)}" alt="">`:esc((u.name||u.username||'P').slice(0,1).toUpperCase());recentGames.innerHTML=(u.recentGames||[]).slice(0,10).map(g=>`<a class="person" href="${esc(g.url||('game.html?id='+g.id))}"><span class="avatar">🎮</span><span><b>${esc(g.title||g.id)}</b><span>${new Date(g.playedAt||Date.now()).toLocaleString()}</span></span></a>`).join('')||'<p class="muted">No recently played games.</p>';stats.innerHTML=`<div class="person"><span class="avatar">@</span><span><b>${esc(u.username||'')}</b><span>username</span></span></div><div class="person"><span class="avatar">⭐</span><span><b>${esc(u.role||'member')}</b><span>rank</span></span></div>`}function resizeImage(file){return new Promise((res,rej)=>{const img=new Image();const r=new FileReader();r.onload=()=>{img.onload=()=>{const size=256,c=document.createElement('canvas'),ctx=c.getContext('2d');c.width=size;c.height=size;const scale=Math.max(size/img.width,size/img.height),w=img.width*scale,h=img.height*scale,x=(size-w)/2,y=(size-h)/2;ctx.drawImage(img,x,y,w,h);res(c.toDataURL('image/jpeg',0.82))};img.onerror=rej;img.src=r.result};r.onerror=rej;r.readAsDataURL(file)})}document.addEventListener('fg-auth-ready',fill);document.addEventListener('fg-user-updated',fill);pfpFile.onchange=async()=>{const file=pfpFile.files&&pfpFile.files[0];if(!file)return;status.textContent='Compressing image...';uploadedData=await resizeImage(file);avatar.innerHTML=`<img src="${uploadedData}" alt="">`;status.textContent='PFP loaded. Click save profile.'};saveProfile.onclick=async()=>{const photoURL=uploadedData||pfpUrl.value.trim();await FGAuth.updateProfilePatch({name:displayName.value,photoURL,bio:bio.value});status.textContent='saved to Firebase + localStorage';uploadedData='';pfpFile.value='';fill()};removePfp.onclick=async()=>{pfpUrl.value='';uploadedData='';pfpFile.value='';await FGAuth.updateProfilePatch({photoURL:''});status.textContent='PFP removed';fill()};
</script></body></html>
