<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#050916"><title>GameHub — Profile</title><link rel="stylesheet" href="ui.css"></head><body>
<section class="grid layout-games">
  <main>
    <section class="profile-hero" id="profileHero">
      <div class="avatar big-avatar" id="avatar">P</div>
      <div>
        <div class="playing-game-pill offline" id="playingGameText">not playing anything</div><h1 class="page-title" id="nameText">profile</h1>
        <p class="muted" id="bioText">Customize your account.</p>
        <span class="rank" id="roleText">member</span><span id="singleTagText"></span>
        <div class="profile-level-card" id="levelText">Lv 0</div>
      </div>
    </section>

    <section class="card card-pad" style="margin-top:16px">
      <div class="section-head"><div><h2>Level Rewards</h2><p class="muted">Every level takes 2 minutes of active time. No AFK farming.</p></div><span class="pill" id="nextRewardText">loading...</span></div>
      <div class="reward-timeline" id="rewardList"></div>
    </section>

    <section class="card card-pad" style="margin-top:16px">
      <div class="section-head"><div><h2>Edit Profile</h2><p class="muted">Rewards unlock more customization as you level up.</p></div></div>
      <div class="profile-editor-grid">
        <div class="field"><label>Display name</label><input id="displayName" maxlength="24"></div>
        <div class="field"><label>Name color <span class="muted">(Level 10)</span></label><input id="nameColor" placeholder="#38bdf8"></div>
        <div class="field"><label>Banner color <span class="muted">(Level 8)</span></label><input id="bannerColor" placeholder="#0f172a"></div>
        <div class="field"><label>Custom status <span class="muted">(Level 15)</span></label><input id="customStatus" maxlength="42" placeholder="playing games"></div>
        <div class="field"><label>Profile frame <span class="muted">(Level 12)</span></label><select id="profileFrame" class="search"><option value="">none</option><option value="glow">glow</option><option value="gold">gold - level 100</option></select></div>
        <div class="field"><label>Username effect</label><select id="nameEffect" class="search"><option value="">none</option><option value="glow">glow - level 25</option><option value="rainbow">rainbow - level 50</option></select></div>
        <div class="field"><label>Upload profile picture</label><input id="pfpFile" type="file" accept="image/*"></div>
        <div class="field"><label>Or paste image URL</label><input id="pfpUrl" placeholder="https://... image link"></div>
        <div class="field full"><label>Bio</label><textarea id="bio" maxlength="420"></textarea></div>
      </div>
      <div class="reward-help" id="unlockHelp">Level rewards will show here.</div>
      <button class="btn primary" id="saveProfile" type="button">Save Profile</button>
      <button class="btn" id="removePfp" type="button">Remove PFP</button>
      <p class="muted" id="status">ready</p>
    </section>
  </main>
  <aside class="right-col">
    <section class="card card-pad"><h2>Recently Played</h2><div class="list" id="recentGames"></div></section>
    <section class="card card-pad"><h2>Account</h2><div class="list" id="stats"></div></section>
  </aside>
</section>
<script src="login-guard.js"></script><script src="shell.js"></script><script>
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
let uploadedData='';
const rewardMilestones=[
  {level:1,icon:'🎮',name:'Level badge',note:'Your level appears on your profile/topbar.'},
  {level:5,icon:'✅',name:'Active Member badge',note:'ACTIVE tag beside your name.'},
  {level:8,icon:'🎨',name:'Banner color',note:'Change your profile header color.'},
  {level:10,icon:'🌈',name:'Custom name color',note:'Pick a regular name color.'},
  {level:12,icon:'🖼️',name:'Profile frame',note:'Unlock glow frame.'},
  {level:15,icon:'💬',name:'Custom status',note:'Short status on your profile.'},
  {level:20,icon:'📜',name:'Bigger bio',note:'Bio limit increases to 420 chars.'},
  {level:25,icon:'✨',name:'Glow username',note:'Make your username glow.'},
  {level:30,icon:'💫',name:'Animated border',note:'Extra profile frame shine.'},
  {level:35,icon:'🏅',name:'Veteran tag',note:'VETERAN tag beside your name.'},
  {level:40,icon:'🟣',name:'Rare theme access',note:'Reserved for future themes.'},
  {level:45,icon:'🔦',name:'Profile spotlight',note:'Your profile gets extra highlight.'},
  {level:50,icon:'🌈',name:'Rainbow username',note:'Animated rainbow name.'},
  {level:60,icon:'🎉',name:'Particle effects',note:'Extra profile sparkle effects.'},
  {level:75,icon:'👑',name:'Legend tag',note:'LEGEND tag beside your name.'},
  {level:100,icon:'🏆',name:'Gold profile',note:'Gold profile/frame unlock.'}
];
function pfp(u){return (window.FGAuth?.pickPhoto?.(u))||u?.photoURL||u?.pfp||u?.pfpUrl||u?.profilePic||u?.profilePicture||u?.profileImage||u?.avatar||u?.avatarUrl||u?.picture||u?.photo||u?.image||u?.icon||''}
function rewards(level){
  level=Number(level||0);
  return {bannerColor:level>=8,customNameColor:level>=10,profileFrame:level>=12,customStatus:level>=15,biggerBio:level>=20,glowName:level>=25,rainbowName:level>=50,goldProfile:level>=100};
}
function setPlayingGame(p={}){
  const current=String(p.currentPage||'').trim();
  const game=String(p.currentGame||p.gameTitle||p.playing||'').trim();
  let label='';
  if(game) label='Playing '+game;
  else if(current.startsWith('playing ')) label='Playing '+current.replace(/^playing\s+/,'').replaceAll('-',' ');
  if(label){playingGameText.textContent='🎮 '+label;playingGameText.classList.remove('offline')}
  else{playingGameText.textContent='not playing anything';playingGameText.classList.add('offline')}
}
function fill(){
  const u=window.FGUser||{},img=pfp(u),level=Number(u.level||0),r=rewards(level);
  nameText.textContent=u.name||u.username||'player';
  bioText.textContent=u.customStatus||u.bio||'No bio yet.';
  roleText.textContent=u.role||u.rank||'member';
  levelText.textContent='Lv '+level;
  const singleTag=(u.customTag||(level>=75?'LEGEND':(level>=35?'VETERAN':(level>=5?'ACTIVE':''))));
  if(window.singleTagText) singleTagText.innerHTML=singleTag?`<span class="${u.customTag?'custom-user-tag':(level>=75?'legend-tag':(level>=35?'veteran-tag':'active-member-tag'))}">${esc(singleTag).toUpperCase()}</span>`:'';
  displayName.value=u.name||'';
  nameColor.value=u.nameColor||'';
  bannerColor.value=u.bannerColor||'';
  customStatus.value=(u.customStatus ?? '');
  profileFrame.value=(u.profileFrame ?? '');
  nameEffect.value=u.useRainbowName?'rainbow':(u.useGlowName?'glow':'');
  pfpUrl.value=img&&String(img).startsWith('http')?img:'';
  bio.maxLength=r.biggerBio?420:260;
  bio.value=u.bio||'';
  profileHero.style.background=u.bannerColor&&r.bannerColor?`linear-gradient(135deg,${u.bannerColor},rgba(255,255,255,.05))`:'';
  profileHero.classList.toggle('profile-frame-glow',u.profileFrame==='glow'&&r.profileFrame);
  profileHero.classList.toggle('profile-frame-gold',u.profileFrame==='gold'&&r.goldProfile);
  avatar.innerHTML=img?`<img src="${esc(img)}" alt="">`:esc((u.name||u.username||'P').slice(0,1).toUpperCase());

  recentGames.innerHTML=(u.recentGames||[]).slice(0,10).map(g=>`<a class="person" href="${esc(g.url||('game.html?id='+g.id))}"><span class="avatar">🎮</span><span><b>${esc(g.title||g.id)}</b><span>${new Date(g.playedAt||Date.now()).toLocaleString()}</span></span></a>`).join('')||'<p class="muted">No recently played games.</p>';
  stats.innerHTML=`<div class="person"><span class="avatar">@</span><span><b>${esc(u.username||'')}</b><span>username</span></span></div><div class="person"><span class="avatar">⭐</span><span><b>${esc(u.role||'member')}</b><span>rank</span></span></div><div class="person"><span class="avatar">⬆️</span><span><b>Lv ${level}</b><span>${Number(u.activeSeconds||0)} active seconds</span></span></div>`;

  rewardList.innerHTML=rewardMilestones.map(item=>{
    const unlocked=level>=item.level;
    return `<div class="reward-node ${unlocked?'unlocked':'locked'}"><div class="reward-icon">${item.icon}</div><div class="lvl">Lv ${item.level}</div><div class="reward-name">${item.name}</div><div class="reward-note">${item.note}</div></div>`;
  }).join('');
  const next=rewardMilestones.find(x=>level<x.level);
  nextRewardText.textContent=next?`Next: Lv ${next.level}`:'All rewards unlocked';
  unlockHelp.textContent=`Unlocked: ${rewardMilestones.filter(x=>level>=x.level).length}/${rewardMilestones.length}. Locked controls will be ignored until you reach the required level.`;
}
function resizeImage(file){return new Promise((res,rej)=>{const img=new Image();const r=new FileReader();r.onload=()=>{img.onload=()=>{const size=256,c=document.createElement('canvas'),ctx=c.getContext('2d');c.width=size;c.height=size;const scale=Math.max(size/img.width,size/img.height),w=img.width*scale,h=img.height*scale,x=(size-w)/2,y=(size-h)/2;ctx.drawImage(img,x,y,w,h);res(c.toDataURL('image/jpeg',0.82))};img.onerror=rej;img.src=r.result};r.onerror=rej;r.readAsDataURL(file)})}
document.addEventListener('fg-auth-ready',async()=>{fill();try{await FGAuth.initFirebase();FGAuth.db().ref('sitePresence/'+window.FGUser.uid).on('value',s=>setPlayingGame(s.val()||{}));}catch(e){}});document.addEventListener('fg-user-updated',fill);
pfpFile.onchange=async()=>{const file=pfpFile.files&&pfpFile.files[0];if(!file)return;status.textContent='Compressing image...';uploadedData=await resizeImage(file);avatar.innerHTML=`<img src="${uploadedData}" alt="">`;status.textContent='PFP loaded. Click save profile.'};
saveProfile.onclick=async()=>{
  const u=window.FGUser||{},r=rewards(u.level||0);
  const patch={name:displayName.value,bio:bio.value.slice(0,r.biggerBio?420:260)};
  const photoURL=uploadedData||pfpUrl.value.trim();
  if(photoURL) patch.photoURL=photoURL;
  if(r.customNameColor) patch.nameColor=nameColor.value.trim();
  if(r.bannerColor) patch.bannerColor=bannerColor.value.trim();
  if(r.customStatus) patch.customStatus=customStatus.value.trim();
  if(r.profileFrame) patch.profileFrame=profileFrame.value==='gold'&&!r.goldProfile?'':profileFrame.value;
  patch.useGlowName=!!(r.glowName && nameEffect.value==='glow');
  patch.useRainbowName=!!(r.rainbowName && nameEffect.value==='rainbow');
  await FGAuth.updateProfilePatch(patch);
  if(window.FGAuth?.db&&window.FGUser?.uid){await FGAuth.db().ref('siteUsers/'+window.FGUser.uid).update({bio:patch.bio});}
  window.FGUser={...(window.FGUser||{}),...patch};
  status.textContent='saved to Firebase + localStorage';
  uploadedData='';pfpFile.value='';
  fill();
};
removePfp.onclick=async()=>{pfpUrl.value='';uploadedData='';pfpFile.value='';await FGAuth.updateProfilePatch({photoURL:''});status.textContent='PFP removed';fill()};
</script></body></html>
