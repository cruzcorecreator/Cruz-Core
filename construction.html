<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fun and Games — Under Construction</title>
  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #121a32;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.14);
      --text: #f5f7ff;
      --muted: #b8c0dd;
      --accent: #7cffc8;
      --accent-2: #6ca8ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(108, 168, 255, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(124, 255, 200, 0.14), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      overflow: hidden;
    }

    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), rgba(0,0,0,.35));
      pointer-events: none;
    }

    .shell {
      width: min(1080px, 100%);
      position: relative;
      z-index: 1;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border: 1px solid var(--card-border);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(124, 255, 200, 0.7);
    }

    .card {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      padding: 34px;
      border: 1px solid var(--card-border);
      background: var(--card);
      backdrop-filter: blur(18px);
      border-radius: 30px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(124, 255, 200, 0.12);
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 82px);
      line-height: 0.96;
      letter-spacing: -0.04em;
    }

    .sub {
      margin: 20px 0 0;
      max-width: 620px;
      font-size: clamp(18px, 2.2vw, 24px);
      line-height: 1.55;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      padding: 15px 22px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 800;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #9dffdb);
      color: #071013;
      box-shadow: 0 14px 35px rgba(124, 255, 200, 0.28);
    }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--card-border);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .visual {
      position: relative;
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .orb {
      position: absolute;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.45), rgba(108,168,255,0.18), transparent 68%);
      filter: blur(8px);
      top: 24px;
      right: 18px;
    }

    .helmet-wrap {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .helmet {
      width: min(250px, 72%);
      filter: drop-shadow(0 22px 28px rgba(0,0,0,0.35));
      animation: float 3.4s ease-in-out infinite;
    }

    .status {
      margin-top: 14px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 860px) {
      .card {
        grid-template-columns: 1fr;
        padding: 24px;
      }

      .visual {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="grid"></div>

  <main class="shell">
    <div class="brand">
      <span class="dot"></span>
      Fun and Games
    </div>

    <section class="card">
      <div class="content">
        <div class="eyebrow">Page Update In Progress</div>
        <h1>Under<br>Construction</h1>
        <p class="sub">
          This page is getting made right now. Check back soon for the finished version.
        </p>

        <div class="actions">
          <a class="btn primary" href="index.html">Back Home</a>
          
        </div>
      </div>

      <div class="visual">
        <div class="orb"></div>
        <div class="helmet-wrap">
          <img class="helmet" src="https://images.vexels.com/media/users/3/241261/isolated/preview/4fd6d35afd5dc7224e3be38a0e2e71fd-builder-hat-semi-flat.png" alt="Construction helmet">
          <div class="status">Working on something cool...</div>
        </div>
      </div>
    </section>
  </main>


</body></html>
