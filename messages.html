<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#050916"><title>GameHub — Messages</title><link rel="stylesheet" href="ui.css"></head><body>
<section class="grid layout-messages"><main class="card chat-shell conversation-main"><header class="chat-head"><div><h1 style="margin:0;font-size:1.55rem" id="chatTitle">Pick a conversation</h1><p class="muted" style="margin:4px 0 0" id="chatSub">Private one-on-one messages.</p></div><a class="btn" href="users.html">New DM</a></header><div class="messages" id="dmMessages"><div class="empty">Choose a person on the right.</div></div><form class="composer" id="dmForm" action="javascript:void(0)"><input id="dmInput" maxlength="600" placeholder="Message..." autocomplete="off"><button class="btn primary" id="dmSend" type="button">Send</button></form></main><aside class="card card-pad conversation-list"><div class="section-head"><h1 style="margin:0;font-size:1.4rem">Conversations</h1></div><div class="list" id="convos"><div class="empty">loading conversations...</div></div></aside></section>

<div class="modal-lite" id="reportModal">
  <div class="modal-box">
    <h2 style="margin-top:0">Report</h2>
    <p class="muted" id="reportTargetText">Report this item.</p>
    <div class="field"><label>Reason</label><select id="reportReason" class="search"><option>spam</option><option>harassment</option><option>nsfw</option><option>impersonation</option><option>exploit</option><option>bypass</option><option>other</option></select></div>
    <div class="field"><label>Description</label><textarea id="reportDescription" maxlength="500" placeholder="Tell staff what happened..."></textarea></div>
    <div class="button-row"><button class="btn primary" id="submitReport" type="button">Submit Report</button><button class="btn" id="cancelReport" type="button">Cancel</button></div>
    <p class="muted" id="reportStatus"></p>
  </div>
</div>

<script src="login-guard.js"></script><script src="shell.js"></script><script>
const esc = s => String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
let db, me, users = {}, dmIndex = {}, active = null, activeWith = null;
let activeMessages = new Map();
let activeListenerRef = null;
let sending = false; const NOVA_UID='bot-nova'; const ASTRO_UID='bot-astro'; const BOT_ACCOUNTS={ [NOVA_UID]:{uid:NOVA_UID,username:'nova',name:'Nova',photoURL:'https://mir-s3-cdn-cf.behance.net/projects/404/aa9f81144900743.Y3JvcCwxMTkyLDkzMywxNCww.jpg'}, [ASTRO_UID]:{uid:ASTRO_UID,username:'astro',name:'Astro',photoURL:'https://cdn-icons-png.flaticon.com/512/4712/4712109.png'} }; const GROQ_API_KEY='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'; let novaDmBusy=false;

const convoKey = (a, b) => [String(a || ''), String(b || '')].sort().join('__');
const urlWith = () => { const w=(new URLSearchParams(location.search).get('with')||'').toLowerCase(); return w==='astro'||w==='@astro' ? ASTRO_UID : (w==='nova'||w==='@nova' ? NOVA_UID : w); };

function pickPhoto(u = {}) {
  return (window.FGAuth?.pickPhoto?.(u)) || String(
    u.photoURL || u.pfp || u.pfpUrl || u.profilePic || u.profilePicture ||
    u.profileImage || u.avatar || u.avatarUrl || u.picture || u.photo || u.image || u.icon || ''
  ).trim();
}

function avatar(u = {}) {
  const img = pickPhoto(u);
  const initial = esc((u.name || u.displayName || u.username || 'U').slice(0, 1).toUpperCase());
  if (img) {
    return `<span class="avatar" data-initial="${initial}"><img src="${esc(img)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove();this.parentElement.textContent=this.parentElement.dataset.initial||'U';"></span>`;
  }
  return `<span class="avatar">${initial}</span>`;
}

function getOtherId(c = {}) {
  return c.withUid || (c.fromUid && c.fromUid !== me.uid ? c.fromUid : '') || (c.to && c.to !== me.uid ? c.to : '');
}

function renderConvos() {
  const arr = Object.entries(dmIndex || {}).map(([id, v]) => ({ id, ...(v || {}) }))
    .sort((a, b) => Number(b.lastAt || 0) - Number(a.lastAt || 0));
  const fixedBotConvos = [NOVA_UID, ASTRO_UID]
    .filter(uid => me?.uid && !arr.some(c => getOtherId(c) === uid))
    .map(uid => ({ id: convoKey(me.uid, uid), withUid: uid, fromUid: uid, fromName: BOT_ACCOUNTS[uid].name, fromUsername: BOT_ACCOUNTS[uid].username, lastText: 'DM ' + BOT_ACCOUNTS[uid].name, lastAt: 0 }));
  const allConvos = [...fixedBotConvos, ...arr];

  convos.innerHTML = allConvos.map(c => {
    const oid = getOtherId(c);
    const u = users[oid] || { uid: oid, username: c.fromUsername || oid || 'user', name: c.fromName || c.fromUsername || 'user' };
    return `<button class="person ${active === c.id ? 'convo-active' : ''}" data-convo="${esc(c.id)}" data-with="${esc(oid)}" type="button" style="width:100%;text-align:left;color:white">${avatar(u)}<span><b>${esc(u.name || u.username || 'user')}</b><span>${esc(c.lastText || '')}</span></span></button>`;
  }).join('') || '<div class="empty">No DMs yet. Go to Users to message someone.</div>';
}

function renderMessages() {
  const list = [...activeMessages.values()].sort((a, b) => Number(a.createdAt || 0) - Number(b.createdAt || 0));
  dmMessages.innerHTML = list.map(m => {
    const mine = m.from === me.uid;
    const u = mine ? me : (users[m.from] || { uid: m.from, name: m.fromName, username: m.fromUsername });
    const reportBtn = !mine ? `<button class="msg-info-btn" data-report-dm="${esc(m.id||'')}" type="button" title="Report DM">🚩</button>` : ''; return `<div class="msg ${mine ? 'mine' : ''}" data-dmid="${esc(m.id||'')}">${avatar(u)}<div class="msg-body"><a class="msg-name" href="viewprofile.html?id=${encodeURIComponent(m.from || '')}">${esc(mine ? 'You' : (u.name || u.username || 'user'))}</a>${reportBtn}<span class="msg-time">${m.createdAt ? new Date(m.createdAt).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) : ''}</span><div class="msg-text">${esc(m.text || '')}</div></div></div>`;
  }).join('') || '<div class="empty">No messages yet.</div>';
  dmMessages.scrollTop = dmMessages.scrollHeight;
}

function startLiveMessages(convo) {
  if (activeListenerRef) activeListenerRef.off();
  activeMessages.clear();
  renderMessages();

  // Important:
  // The conversation preview reads siteDMIndex, but the open chat must read the actual
  // saved message list. A value listener loads the full saved history and updates when
  // either person sends a message, even if the other user is offline.
  activeListenerRef = db.ref('siteDMs/' + convo + '/messages').limitToLast(160);
  activeListenerRef.on('value', snap => {
    activeMessages.clear();
    snap.forEach(child => {
      const v = child.val() || {};
      if (v.text || v.createdAt || v.from) {
        activeMessages.set(child.key, { id: child.key, ...v });
      }
    });
    renderMessages();
  }, err => {
    console.error(err);
    dmMessages.innerHTML = '<div class="empty">Could not load this conversation.</div>';
  });
}

function openConvo(id, withUid) {
  if (!withUid || !me?.uid) return;
  if(BOT_ACCOUNTS[withUid]) users[withUid]=BOT_ACCOUNTS[withUid];
  active = id || convoKey(me.uid, withUid);
  activeWith = withUid;
  renderConvos();
  const u = users[withUid] || { uid: withUid, username: withUid, name: withUid };
  chatTitle.textContent = u.name || u.username || 'Conversation';
  chatSub.innerHTML = `with <a href="viewprofile.html?id=${encodeURIComponent(withUid)}">${esc(u.username || withUid)}</a>`;
  startLiveMessages(active);
}

function maybeOpenFromUrl() {
  const withUid = urlWith();
  if (withUid && me?.uid && activeWith !== withUid) openConvo(convoKey(me.uid, withUid), withUid);
}




function cleanNovaReply(reply=''){
  return String(reply||'')
    .replace(/^\s*(nova|astro|bot)\s*:\s*/i,'')
    .replace(/^\s*(i('|’)m|i am|im)\s+(checking|looking|searching|working|doing|generating|processing|handling)[^.!?]*[.!?]?\s*/i,'')
    .replace(/\b(high|drunk|hungover|faded|intoxicated|stoned)\b/gi,'tired')
    .replace(/\b(weed|drugs|alcohol)\b/gi,'stuff')
    .replace(/\b(fuck|shit|bitch|asshole|dick|damn|hell)\b/gi, m=>({fuck:'frick',shit:'crap',bitch:'jerk',asshole:'jerk',dick:'dude',damn:'dang',hell:'heck'}[String(m).toLowerCase()]||'dang'))
    .trim();
}
async function novaEnabled(){
  try{
    const s=await db.ref('siteSettings/nova/enabled').get();
    if(!s.exists()){await db.ref('siteSettings/nova/enabled').set(true);return true;}
    return s.val()!==false;
  }catch(e){return true}
}
async function setNovaAI(value){
  await db.ref('siteSettings/nova').update({enabled:!!value,updatedAt:Date.now(),updatedBy:me?.uid||''});
  await db.ref('siteNovaLogs').push({status:value?'enabled-dm':'disabled-dm',uid:me?.uid||'',username:me?.username||'',createdAt:Date.now()});
}
async function postBotDM(convo,text,botUid=NOVA_UID){
  const bot=BOT_ACCOUNTS[botUid]||BOT_ACCOUNTS[NOVA_UID];
  const createdAt=Date.now();
  const botMsg={from:bot.uid,fromName:bot.name,fromUsername:bot.username,to:me.uid,text:String(text).slice(0,1200),createdAt,isBot:true,bot:true};
  await db.ref('siteDMs/'+convo+'/messages').push(botMsg);
  await Promise.all([
    db.ref('siteDMIndex/'+me.uid+'/'+convo).set({conversation:convo,withUid:bot.uid,fromUid:bot.uid,fromName:bot.name,fromUsername:bot.username,lastText:botMsg.text,lastAt:createdAt}),
    db.ref('siteDMIndex/'+bot.uid+'/'+convo).set({conversation:convo,withUid:me.uid,fromUid:me.uid,fromName:me.name||me.username,fromUsername:me.username,lastText:botMsg.text,lastAt:createdAt})
  ]);
}
async function triggerNovaDM(userText,convo,botUid=activeWith){
  if(novaDmBusy||!db||![NOVA_UID,ASTRO_UID].includes(botUid))return;
  if(!(await novaEnabled()))return;
  const bot=BOT_ACCOUNTS[botUid]||BOT_ACCOUNTS[NOVA_UID];
  novaDmBusy=true;
  try{
    await db.ref('siteNovaLogs').push({status:bot.username+'-dm-triggered',details:String(userText).slice(0,500),uid:me.uid,username:me.username,createdAt:Date.now()});
    const snap=await db.ref('siteDMs/'+convo+'/messages').limitToLast(12).get();
    const lines=[];
    snap.forEach(c=>{
      const v=c.val()||{};
      const speaker=(BOT_ACCOUNTS[v.from]?.name)||(v.fromName||v.fromUsername||'user');
      lines.push(`${speaker}: ${v.text||''}`);
    });
    const system=`You are ${bot.name}, a real user in a school game website DM. You are not an assistant. Keep replies short and natural. Do not cuss. Do not say you are high, drunk, hungover, faded, intoxicated, stoned, or on drugs. Do not start with "${bot.name}:". Do not say you are checking, searching, generating, processing, working, or doing anything. Use a little casual Gen Z tone, but not too much. No markdown.`;
    const prompt=`DM history:\n${lines.join('\n')}\n\nReply to ${me.name||me.displayName||me.username}. Answer only their latest DM.`;
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_API_KEY},body:JSON.stringify({model:'llama-3.1-8b-instant',messages:[{role:'system',content:system},{role:'user',content:prompt}],temperature:0.9,max_tokens:120})});
    const data=await res.json();
    if(!res.ok){await db.ref('siteNovaLogs').push({status:bot.username+'-dm-groq-error',details:JSON.stringify(data).slice(0,1200),uid:me.uid,createdAt:Date.now()});console.error(bot.username+' DM Groq error',data);return;}
    const reply=cleanNovaReply(data?.choices?.[0]?.message?.content||'');
    if(reply)await postBotDM(convo,reply,bot.uid);
  }catch(e){
    console.error('Bot DM error',e);
    try{await db.ref('siteNovaLogs').push({status:bot.username+'-dm-error',details:e.message||String(e),uid:me.uid,createdAt:Date.now()})}catch(_){}
  }finally{novaDmBusy=false}
}

async function sendDM() {
  if (sending) return;
  if (!activeWith) return FGAuth.showNotice('Pick a conversation first.');
  const text = dmInput.value.trim();
  if (!text) return;
  if(text.toLowerCase()==='/disableai'){await setNovaAI(false);dmInput.value='';FGAuth.showNotice('Nova AI disabled.');return;}
  if(text.toLowerCase()==='/enableai'){await setNovaAI(true);dmInput.value='';FGAuth.showNotice('Nova AI enabled.');return;}
  sending = true;
  dmInput.value = '';
  const convo = active || convoKey(me.uid, activeWith);
  active = convo;
  const createdAt = Date.now();
  const msg = {
    from: me.uid,
    fromName: me.name || me.username,
    fromUsername: me.username,
    to: activeWith,
    text: text.slice(0, 600),
    createdAt
  };
  try {
    await db.ref('siteDMs/' + convo + '/messages').push(msg);

    const other = users[activeWith] || {};
    await Promise.all([
      db.ref('siteDMIndex/' + me.uid + '/' + convo).set({ conversation: convo, withUid: activeWith, fromUid: activeWith, fromName: other.name || other.username || activeWith, fromUsername: other.username || activeWith, lastText: msg.text, lastAt: createdAt }),
      db.ref('siteDMIndex/' + activeWith + '/' + convo).set({ conversation: convo, withUid: me.uid, fromUid: me.uid, fromName: me.name || me.username, fromUsername: me.username, lastText: msg.text, lastAt: createdAt })
    ]);
    if (!activeListenerRef || active !== convo) startLiveMessages(convo);
    const botTarget=activeWith;if([NOVA_UID,ASTRO_UID].includes(botTarget))setTimeout(()=>triggerNovaDM(msg.text,convo,botTarget),250);
  } catch (e) {
    console.error(e);
    FGAuth.showNotice('DM failed to send.');
    dmInput.value = text;
  } finally {
    setTimeout(() => { sending = false; }, 150);
  }
}


document.addEventListener('click',e=>{
  const b=e.target.closest('[data-report-dm]');
  if(!b)return;
  const id=b.dataset.reportDm;
  const m=activeMessages.get(id)||{};
  if(m.from===me.uid){return;}
  const u=users[m.from]||{uid:m.from,name:m.fromName,username:m.fromUsername};
  openReportModal({type:'dm',targetUid:m.from||'',targetUsername:u.username||'',targetName:u.name||u.username||m.from||'',targetId:id,messageId:id,messageText:m.text||'',context:'private DM message'});
});


async function ensureNovaDMAccount(){
  if(!db)return;
  for(const bot of Object.values(BOT_ACCOUNTS)){
    const snap=await db.ref('siteUsers/'+bot.uid).get().catch(()=>null);
    const base={uid:bot.uid,username:bot.username,name:bot.name,displayName:bot.name,role:'bot',rank:'bot',bot:true,isBot:true,verified:true,provider:'bot-account',createdAt:Date.now(),lastSeen:Date.now(),photoURL:bot.photoURL,pfp:bot.photoURL};
    if(!snap||!snap.exists()) await db.ref('siteUsers/'+bot.uid).set(base);
    else await db.ref('siteUsers/'+bot.uid).update({...base,...(snap.val()||{}),uid:bot.uid,username:bot.username,role:'bot',rank:'bot',bot:true,isBot:true,verified:true});
    await db.ref('siteUsernames/'+bot.username).set(bot.uid);
  }
}

document.addEventListener('fg-auth-ready', async () => {
  me = window.FGUser;
  await FGAuth.initFirebase();
  db = FGAuth.db();
  await ensureNovaDMAccount(); Object.assign(users,BOT_ACCOUNTS);
  await db.ref('siteSettings/nova/enabled').get().then(s=>{if(!s.exists())return db.ref('siteSettings/nova/enabled').set(true)}).catch(()=>{});

  db.ref('siteUsers').on('value', s => {
    users = s.val() || {}; Object.assign(users,BOT_ACCOUNTS);
    renderConvos();
    maybeOpenFromUrl();
    renderMessages();
  });

  db.ref('siteDMIndex/' + me.uid).on('value', s => {
    dmIndex = s.val() || {};
    renderConvos();
    maybeOpenFromUrl();
  });

  maybeOpenFromUrl();
});

convos.addEventListener('click', e => {
  const b = e.target.closest('[data-convo]');
  if (b) openConvo(b.dataset.convo, b.dataset.with);
});

dmForm.setAttribute('action', 'javascript:void(0)');
dmSend.type = 'submit';
dmForm.addEventListener('submit', e => {
  e.preventDefault();
  e.stopPropagation();
  sendDM();
  return false;
});
</script>
<script>
(function(){
  let currentReport=null, reportDb=null;
  function escReport(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
  async function getReportDb(){if(reportDb)return reportDb;await FGAuth.initFirebase();reportDb=FGAuth.db();return reportDb;}
  window.openReportModal=function(data){
    currentReport=data||{};
    const modal=document.getElementById('reportModal');
    const text=document.getElementById('reportTargetText');
    const status=document.getElementById('reportStatus');
    if(text)text.textContent='Reporting '+(currentReport.targetName||currentReport.targetUsername||currentReport.targetUid||currentReport.targetId||currentReport.type||'item');
    if(status)status.textContent='';
    if(document.getElementById('reportDescription'))reportDescription.value='';
    modal?.classList.add('open');
  };
  async function submitReport(){
    if(!currentReport)return;
    const db=await getReportDb();
    const me=window.FGUser||{};
    const payload={
      ...currentReport,
      reason:document.getElementById('reportReason')?.value||'other',
      description:(document.getElementById('reportDescription')?.value||'').trim(),
      status:'open',
      reporterUid:me.uid||'',
      reporterUsername:me.username||'',
      reporterName:me.name||me.username||'',
      by:me.uid||'',
      byName:me.name||me.username||'',
      createdAt:Date.now()
    };
    await db.ref('siteReports').push(payload);
    if(document.getElementById('reportStatus'))reportStatus.textContent='Report sent.';
    setTimeout(()=>document.getElementById('reportModal')?.classList.remove('open'),600);
  }
  document.addEventListener('click',e=>{
    if(e.target?.id==='cancelReport')document.getElementById('reportModal')?.classList.remove('open');
    if(e.target?.id==='submitReport')submitReport();
    if(e.target===document.getElementById('reportModal'))document.getElementById('reportModal')?.classList.remove('open');
  });
})();
</script>
<script src="user-loading-fix.js"></script>
</body></html>
