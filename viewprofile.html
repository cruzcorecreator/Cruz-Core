<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#050916"><title>GameHub — View Profile</title><link rel="stylesheet" href="ui.css"></head><body>
<section class="grid layout-games"><main><section class="profile-hero"><div class="avatar big-avatar" id="avatar">?</div><div><h1 class="page-title" id="nameText">profile</h1><p class="muted" id="bioText">loading...</p><span class="rank" id="roleText">member</span></div></section><section class="card card-pad" style="margin-top:16px"><h2>Actions</h2><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" id="messageBtn">Message</button><button class="btn" id="followBtn">Follow</button><button class="btn" id="friendBtn">Add Friend</button><button class="btn" id="blockBtn">Block</button></div><p class="muted" id="status"></p></section></main><aside class="right-col"><section class="card card-pad"><h2>Recently Played</h2><div class="list" id="recentGames"></div></section><section class="card card-pad"><h2>Info</h2><div class="list" id="stats"></div></section></aside></section>
<script src="login-guard.js"></script><script src="shell.js"></script><script>
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));const id=new URLSearchParams(location.search).get('id');let db,me,u={};const key=(a,b)=>[a,b].sort().join('__');function render(){if(!u.uid){nameText.textContent='profile not found';return}nameText.textContent=u.name||u.username||'player';bioText.textContent=u.bio||'No bio yet.';roleText.textContent=u.role||u.rank||'member';avatar.innerHTML=(window.FGAuth?.pickPhoto?.(u))?`<img src="${esc(window.FGAuth.pickPhoto(u))}" loading="lazy" referrerpolicy="no-referrer">`:esc((u.name||u.username||'P').slice(0,1).toUpperCase());recentGames.innerHTML=(u.recentGames||[]).slice(0,10).map(g=>`<a class="person" href="${esc(g.url||('game.html?id='+g.id))}"><span class="avatar">🎮</span><span><b>${esc(g.title||g.id)}</b><span>${new Date(g.playedAt||Date.now()).toLocaleString()}</span></span></a>`).join('')||'<p class="muted">No recent games visible.</p>';stats.innerHTML=`<div class="person"><span class="avatar">@</span><span><b>${esc(u.username||'')}</b><span>username</span></span></div><div class="person"><span class="avatar">⭐</span><span><b>${esc(u.role||'member')}</b><span>rank</span></span></div>`}document.addEventListener('fg-auth-ready',async()=>{me=window.FGUser;await FGAuth.initFirebase();db=FGAuth.db();db.ref('siteUsers/'+id).on('value',s=>{u=s.val()||{};render()});});messageBtn.onclick=async()=>{location.href='messages.html?with='+encodeURIComponent(id)};followBtn.onclick=async()=>{await Promise.all([db.ref('siteSocial/following/'+me.uid+'/'+id).set(true),db.ref('siteSocial/followers/'+id+'/'+me.uid).set(true)]);status.textContent='followed'};friendBtn.onclick=async()=>{await Promise.all([db.ref('siteSocial/friendRequests/'+id+'/'+me.uid).set({uid:me.uid,username:me.username,name:me.name,createdAt:Date.now()}),db.ref('siteSocial/friendRequestsSent/'+me.uid+'/'+id).set(true)]);status.textContent='friend request sent'};blockBtn.onclick=async()=>{await Promise.all([db.ref('siteSocial/blocks/'+me.uid+'/'+id).set(true),db.ref('siteSocial/blockedBy/'+id+'/'+me.uid).set(true)]);status.textContent='blocked'};
</script></body></html>
