<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#050916"><title>GameHub — View Profile</title><link rel="stylesheet" href="ui.css"></head><body>
<section class="grid layout-games"><main><section class="profile-hero" id="profileHero"><div class="avatar big-avatar" id="avatar">?</div><div><h1 class="page-title" id="nameText">profile</h1><p class="muted" id="bioText">loading...</p><span class="rank" id="roleText">member</span><span id="singleTagText"></span><div class="profile-level-card" id="levelText">Lv 0</div></div></section><section class="card card-pad" style="margin-top:16px"><h2>Actions</h2><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" id="messageBtn">Message</button><button class="btn" id="followBtn">Follow</button><button class="btn" id="friendBtn">Add Friend</button><button class="btn" id="blockBtn">Block</button></div><p class="muted" id="status"></p></section><section class="card card-pad" style="margin-top:16px"><h2>Level Rewards</h2><div class="reward-timeline" id="rewardList"></div></section></main><aside class="right-col"><section class="card card-pad"><h2>Recently Played</h2><div class="list" id="recentGames"></div></section><section class="card card-pad"><h2>Info</h2><div class="list" id="stats"></div></section></aside></section>
<script src="login-guard.js"></script><script src="shell.js"></script><script>
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const id=new URLSearchParams(location.search).get('id');let db,me,u={};
const rewardMilestones=[[1,'🎮','Level badge'],[5,'✅','Active Member'],[8,'🎨','Banner color'],[10,'🌈','Name color'],[12,'🖼️','Profile frame'],[15,'💬','Custom status'],[20,'📜','Bigger bio'],[25,'✨','Glow username'],[30,'💫','Animated border'],[35,'🏅','Veteran tag'],[40,'🟣','Rare theme'],[45,'🔦','Spotlight'],[50,'🌈','Rainbow name'],[60,'🎉','Particles'],[75,'👑','Legend tag'],[100,'🏆','Gold profile']];
function rewards(level){level=Number(level||0);return {bannerColor:level>=8,customNameColor:level>=10,profileFrame:level>=12,customStatus:level>=15,glowName:level>=25,veteranTag:level>=35,rainbowName:level>=50,legendTag:level>=75,goldProfile:level>=100}}
function nameClass(user){const r=rewards(user.level||0);if(String(user.username||'').toLowerCase()==='cruz')return 'rgb-cruz-name';if(r.rainbowName&&user.useRainbowName)return 'rainbow-name';if(r.glowName&&user.useGlowName)return 'name-glow';return ''}
function nameStyle(user){const r=rewards(user.level||0);if(String(user.username||'').toLowerCase()==='cruz'||(r.rainbowName&&user.useRainbowName))return '';return r.customNameColor&&user.nameColor?`style="color:${esc(user.nameColor)}"`:''}
function setPlayingGame(p={}){
  const current=String(p.currentPage||'').trim();
  const game=String(p.currentGame||p.gameTitle||p.playing||'').trim();
  let label='';
  if(game) label='Playing '+game;
  else if(current.startsWith('playing ')) label='Playing '+current.replace(/^playing\\s+/,'').replaceAll('-',' ');
  const el=window.playingGameText;
  if(!el)return;
  el.textContent=label?('🎮 '+label):'not playing anything';
}
function render(){
  if(!u.uid){nameText.textContent='profile not found';return}
  const lvl=Number(u.level||0), r=rewards(lvl), photo=window.FGAuth?.pickPhoto?.(u);
  nameText.innerHTML=`<span class="${nameClass(u)}" ${nameStyle(u)}>${esc(u.name||u.username||'player')}</span>`;
  bioText.textContent=u.customStatus||u.bio||'No bio yet.';
  roleText.textContent=u.role||u.rank||'member';
  levelText.textContent='Lv '+lvl;
  const singleTag=(u.customTag||(lvl>=75?'LEGEND':(lvl>=35?'VETERAN':(lvl>=5?'ACTIVE':''))));
  singleTagText.innerHTML=singleTag?`<span class="${u.customTag?'custom-user-tag':(lvl>=75?'legend-tag':(lvl>=35?'veteran-tag':'active-member-tag'))}">${esc(singleTag).toUpperCase()}</span>`:'';
  profileHero.style.background=u.bannerColor&&r.bannerColor?`linear-gradient(135deg,${u.bannerColor},rgba(255,255,255,.05))`:'';
  profileHero.classList.toggle('profile-frame-glow',u.profileFrame==='glow'&&r.profileFrame);
  profileHero.classList.toggle('profile-frame-gold',u.profileFrame==='gold'&&r.goldProfile);
  avatar.innerHTML=photo?`<img src="${esc(photo)}" loading="lazy" referrerpolicy="no-referrer">`:esc((u.name||u.username||'P').slice(0,1).toUpperCase());
  recentGames.innerHTML=(u.recentGames||[]).slice(0,10).map(g=>`<a class="person" href="${esc(g.url||('game.html?id='+g.id))}"><span class="avatar">🎮</span><span><b>${esc(g.title||g.id)}</b><span>${new Date(g.playedAt||Date.now()).toLocaleString()}</span></span></a>`).join('')||'<p class="muted">No recent games visible.</p>';
  stats.innerHTML=`<div class="person"><span class="avatar">🟢</span><span><b>Status</b><span id="playingGameText">not playing anything</span></span></div><div class="person"><span class="avatar">@</span><span><b>${esc(u.username||'')}</b><span>username</span></span></div><div class="person"><span class="avatar">⭐</span><span><b>${esc(u.role||'member')}</b><span>rank</span></span></div><div class="person"><span class="avatar">⬆️</span><span><b>Lv ${lvl}</b><span>${Number(u.activeSeconds||0)} active seconds</span></span></div>`;
  rewardList.innerHTML=rewardMilestones.map(x=>`<div class="reward-node ${lvl>=x[0]?'unlocked':'locked'}"><div class="reward-icon">${x[1]}</div><div class="lvl">Lv ${x[0]}</div><div class="reward-name">${x[2]}</div></div>`).join('');
}
document.addEventListener('fg-auth-ready',async()=>{me=window.FGUser;await FGAuth.initFirebase();db=FGAuth.db();db.ref('siteUsers/'+id).on('value',s=>{u=s.val()||{};render()});db.ref('sitePresence/'+id).on('value',s=>setPlayingGame(s.val()||{}));});
messageBtn.onclick=async()=>{location.href='messages.html?with='+encodeURIComponent(id)};
followBtn.onclick=async()=>{await Promise.all([db.ref('siteSocial/following/'+me.uid+'/'+id).set(true),db.ref('siteSocial/followers/'+id+'/'+me.uid).set(true)]);status.textContent='followed'};
friendBtn.onclick=async()=>{await Promise.all([db.ref('siteSocial/friendRequests/'+id+'/'+me.uid).set({uid:me.uid,username:me.username,name:me.name,createdAt:Date.now()}),db.ref('siteSocial/friendRequestsSent/'+me.uid+'/'+id).set(true)]);status.textContent='friend request sent'};
blockBtn.onclick=async()=>{await Promise.all([db.ref('siteSocial/blocks/'+me.uid+'/'+id).set(true),db.ref('siteSocial/blockedBy/'+id+'/'+me.uid).set(true)]);status.textContent='blocked'};
</script></body></html>
