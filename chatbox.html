<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fun and games - chatbox</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-1: #08111f;
      --bg-2: #0f1b2e;
      --panel: rgba(14, 23, 39, 0.78);
      --panel-strong: rgba(12, 20, 34, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(255, 255, 255, 0.18);
      --text: #eef4ff;
      --muted: #a9b7cf;
      --muted-2: #7e8da7;
      --accent: #6d8dff;
      --accent-2: #7b54ff;
      --green: #23d18b;
      --danger: #ff6b7c;
      --gold: #ffc857;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.4);
      --radius-xl: 32px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --blur: blur(18px);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(123, 84, 255, 0.25), transparent 28%),
        radial-gradient(circle at top right, rgba(35, 209, 139, 0.16), transparent 24%),
        linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 54%, #060c17 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.65), transparent 95%);
      opacity: .25;
    }

    .page {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    .site-title {
      margin: 0 0 18px;
      text-align: center;
      font-size: clamp(3rem, 7vw, 5.5rem);
      line-height: .9;
      letter-spacing: -0.08em;
      font-weight: 900;
      text-transform: lowercase;
      color: #f7fbff;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    .chat-shell,
    .bottom-panel,
    .modal {
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .chat-shell {
      border-radius: var(--radius-xl);
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    .chat-shell::before,
    .bottom-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,.08), transparent 35%, transparent 65%, rgba(255,255,255,.03));
    }

    .chat-title {
      margin: 0 0 18px;
      font-size: clamp(2.3rem, 5vw, 3.8rem);
      letter-spacing: -0.06em;
      font-weight: 900;
      text-transform: lowercase;
      color: #ffffff;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      margin-bottom: 16px;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .toolbar-right { justify-content: flex-end; }

    .small-btn,
    .chip,
    .options-btn,
    .send-btn,
    .confirm-btn,
    .close-btn,
    .fullscreen-btn {
      border: 1px solid var(--border-strong);
      color: var(--text);
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .small-btn,
    .chip {
      min-height: 46px;
      border-radius: 999px;
      padding: 0 16px;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .small-btn {
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .small-btn:hover,
    .send-btn:hover,
    .confirm-btn:hover,
    .fullscreen-btn:hover,
    .options-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.24);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .messages {
      height: 520px;
      overflow-y: auto;
      padding: 8px 6px 8px 2px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.22) transparent;
    }

    .messages::-webkit-scrollbar { width: 10px; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.16);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .message {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.045));
      border: 1px solid rgba(255,255,255,0.08);
    }

    .message-main {
      min-width: 0;
      flex: 1;
      font-size: clamp(1rem, 2vw, 1.08rem);
      line-height: 1.55;
      color: #f6f9ff;
    }

    .name {
      font-weight: 800;
      margin-right: 8px;
      display: inline-block;
    }

    .badge {
      display: inline-block;
      margin-right: 6px;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,.25));
    }

    .meta-note,
    .system-message,
    .status {
      color: var(--muted);
    }

    .meta-note {
      display: block;
      margin-top: 6px;
      font-size: .8rem;
      font-weight: 600;
    }

    .system-message {
      margin: 2px 0;
      padding: 11px 14px;
      border-radius: 16px;
      background: rgba(35, 209, 139, 0.1);
      border: 1px solid rgba(35, 209, 139, 0.16);
      font-size: .95rem;
      font-weight: 700;
    }

    .message-actions { position: relative; flex: 0 0 auto; }

    .options-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .options-menu {
      position: absolute;
      top: 46px;
      right: 0;
      min-width: 210px;
      border-radius: 18px;
      background: rgba(10, 16, 28, 0.96);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 18px 40px rgba(0,0,0,.4);
      padding: 8px;
      z-index: 50;
      backdrop-filter: blur(14px);
    }

    .options-menu button {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: left;
      font-weight: 700;
      cursor: pointer;
      padding: 11px 12px;
      border-radius: 12px;
      font-size: .92rem;
    }

    .options-menu button:hover { background: rgba(255,255,255,0.08); }

    .composer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding: 10px;
      border-radius: 24px;
      background: rgba(5, 10, 20, 0.56);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .composer input,
    .name-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    .composer input {
      flex: 1;
      min-width: 0;
      height: 56px;
      padding: 0 10px 0 12px;
      font-size: clamp(1rem, 2vw, 1.08rem);
      font-weight: 600;
    }

    .composer input::placeholder,
    .name-input::placeholder {
      color: var(--muted-2);
      opacity: 1;
    }

    .send-btn,
    .confirm-btn {
      border-radius: 18px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .send-btn {
      flex: 0 0 auto;
      min-width: 118px;
      height: 56px;
      padding: 0 20px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #fff;
      border-color: rgba(146, 166, 255, 0.32);
    }

    .status {
      min-height: 1.25rem;
      margin-top: 10px;
      font-size: .92rem;
      font-weight: 600;
    }

    .bottom-panel {
      position: relative;
      margin-top: 16px;
      border-radius: var(--radius-xl);
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      overflow: hidden;
    }

    .bottom-left h2 {
      margin: 0 0 6px;
      font-size: clamp(2rem, 4vw, 2.9rem);
      line-height: .95;
      letter-spacing: -0.05em;
      text-transform: lowercase;
    }

    .bottom-left p {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      font-size: .98rem;
      line-height: 1.6;
      font-weight: 600;
    }

    .fullscreen-btn,
    .close-btn {
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .fullscreen-btn {
      width: 88px;
      height: 88px;
      border-radius: 26px;
      flex: 0 0 auto;
    }

    .fullscreen-btn svg { width: 42px; height: 42px; }
    .fullscreen-btn path { stroke: #f6f9ff; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(1, 6, 14, 0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .modal-backdrop.hidden { display: none; }

    .modal {
      position: relative;
      width: min(560px, 100%);
      border-radius: 30px;
      padding: 26px;
    }

    .modal-title {
      margin: 0 0 18px;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: -0.06em;
      text-transform: lowercase;
    }

    .name-input-wrap {
      border-radius: 20px;
      padding: 0 16px;
      background: rgba(5, 10, 20, 0.58);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .name-input {
      height: 68px;
      font-size: 1.08rem;
      font-weight: 700;
    }

    .confirm-btn {
      width: 100%;
      height: 58px;
      margin-top: 14px;
      background: linear-gradient(135deg, var(--green), #17bcae);
      color: #04101d;
      border-color: rgba(96, 255, 194, 0.28);
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 50px;
      height: 50px;
      border-radius: 16px;
      font-size: 1.2rem;
      font-weight: 800;
    }

    @media (max-width: 860px) {
      .toolbar { grid-template-columns: 1fr; }
      .toolbar-right { justify-content: flex-start; }
      .messages { height: 440px; }
      .bottom-panel { align-items: flex-start; }
    }

    @media (max-width: 620px) {
      .page { width: min(100% - 18px, 1220px); padding-top: 18px; }
      .chat-shell, .bottom-panel, .modal { border-radius: 24px; }
      .chat-shell { padding: 16px; }
      .messages { height: 390px; }
      .composer { flex-wrap: wrap; }
      .send-btn { width: 100%; }
      .bottom-panel { flex-direction: column; }
      .fullscreen-btn { width: 100%; height: 62px; border-radius: 18px; }
      .fullscreen-btn svg { width: 34px; height: 34px; }
    }
  </style>
</head>
<body>
  <div class="page" id="appRoot">
    <h1 class="site-title">fun and games</h1>

    <section class="chat-shell" id="chatShell">
      <h2 class="chat-title">chatbox</h2>

      <div class="toolbar">
        <div class="toolbar-left">
          <button class="small-btn" id="changeNameBtn" type="button">Change name</button>
          <button class="small-btn" id="changeColorBtn" type="button">Change color</button>
          <div class="chip" id="roleChip">Role: member</div>
        </div>

        <div class="toolbar-right">
          <div class="chip" id="nameChip">Name: ???</div>
          <div class="chip" id="onlineChip">Online: ...</div>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <form class="composer" id="composerForm" autocomplete="off">
        <input id="messageInput" type="text" maxlength="300" placeholder="Type something!" />
        <button class="send-btn" type="submit">Send</button>
      </form>

      <div class="status" id="statusText"></div>
    </section>

    <section class="bottom-panel">
      <div class="bottom-left">
        <h2>chatbox</h2>
        <p>my chat filter can detect when you are saying words you arent supposed to. be cautious of what you say.</p>
      </div>

      <button class="fullscreen-btn" id="fullscreenBtn" aria-label="Toggle fullscreen">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 24V10H24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M40 10H54V24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M54 40V54H40" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M24 54H10V40" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </section>
  </div>

  <div class="modal-backdrop" id="nameModal">
    <div class="modal">
      <button class="close-btn" id="closeModalBtn" type="button">✕</button>
      <h2 class="modal-title">Chatbox</h2>
      <div class="name-input-wrap">
        <input class="name-input" id="nameInput" type="text" maxlength="20" placeholder="Name" />
      </div>
      <button class="confirm-btn" id="confirmNameBtn" type="button">Confirm</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import { getDatabase, ref, push, set, update, remove, get, onValue, onChildAdded, onDisconnect, query, limitToLast, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyDvKpZacWOgca6PtoA6wP2QFX3JbI-Dvw4',
      authDomain: 'funandgames-4e8c1.firebaseapp.com',
      databaseURL: 'https://funandgames-4e8c1-default-rtdb.firebaseio.com',
      projectId: 'funandgames-4e8c1',
      storageBucket: 'funandgames-4e8c1.firebasestorage.app',
      messagingSenderId: '240713956788',
      appId: '1:240713956788:web:37b64a7a534f1e2bea06e1',
      measurementId: 'G-KLSV3Q73MR'
    };

    const DB_ROOT = 'fun-and-games-chat';
    const DEFAULT_COLORS = ['#7b54ff', '#0fc15e', '#3576ff', '#ff7a00', '#d133ff', '#1db3a6'];
    const ROLE_INFO = {
      owner: { label: 'owner', rank: 4, badge: '👑', color: '#ff3131' },
      admin: { label: 'admin', rank: 3, badge: '🛡️', color: '#2e78ff' },
      mod: { label: 'mod', rank: 2, badge: '🔨', color: '#9a47ff' },
      helper: { label: 'helper', rank: 1, badge: '✨', color: '#0aa870' },
      member: { label: 'member', rank: 0, badge: '', color: '' }
    };
    const SELECTABLE_ROLES = ['member', 'helper', 'mod', 'admin'];
    const blockedTerms = ['nigger','fuck','shit','ass','nigga','fat','faggot','kike','spic','retard','rape','rapist','kill yourself','kys','suicide','porn','sex','cum','dick','pussy','bitch','slut','whore'];

    const messagesEl = document.getElementById('messages');
    const composerForm = document.getElementById('composerForm');
    const messageInput = document.getElementById('messageInput');
    const statusText = document.getElementById('statusText');
    const nameModal = document.getElementById('nameModal');
    const nameInput = document.getElementById('nameInput');
    const confirmNameBtn = document.getElementById('confirmNameBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const appRoot = document.getElementById('appRoot');
    const changeNameBtn = document.getElementById('changeNameBtn');
    const changeColorBtn = document.getElementById('changeColorBtn');
    const roleChip = document.getElementById('roleChip');
    const nameChip = document.getElementById('nameChip');
    const onlineChip = document.getElementById('onlineChip');

    const deviceId = localStorage.getItem('funAndGamesDeviceId') || crypto.randomUUID();
    localStorage.setItem('funAndGamesDeviceId', deviceId);

    let currentName = localStorage.getItem('funAndGamesName') || '';
    let currentColor = localStorage.getItem('funAndGamesColor') || '';
    let messagesDbRef = null;
    let db = null;
    let messagesSeen = new Set();
    let profiles = {};
    let onlineUsers = {};
    let systemState = { slowmodeSeconds: 0, locked: false, shutdown: false };
    let myRole = 'member';
    let ownerUnlocked = false;
    let adminUnlocked = false;
    let lastSentAt = 0;

    function normalizeName(name) { return (name || '').replace(/\s+/g, ' ').trim().slice(0, 20); }
    function sanitizeMessage(text) { return (text || '').replace(/\s+/g, ' ').trim().slice(0, 300); }
    function escapeHtml(text) { return String(text).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'", '&#039;'); }
    function containsBlockedTerm(text) { const lower = text.toLowerCase(); return blockedTerms.some(term => lower.includes(term)); }
    function roleRank(role) { return ROLE_INFO[role]?.rank ?? 0; }
    function roleBadge(role) { return ROLE_INFO[role]?.badge || ''; }
    function colorForName(name) {
      if (name.toLowerCase() === 'cruz') return '#ff3131';
      let hash = 0;
      for (let i = 0; i < name.length; i += 1) hash = ((hash << 5) - hash) + name.charCodeAt(i);
      return DEFAULT_COLORS[Math.abs(hash) % DEFAULT_COLORS.length];
    }
    function getProfile(id) {
      return profiles[id] || {
        name: id === deviceId ? currentName : 'user',
        color: '', role: 'member', bio: '', bannedUntil: 0, mutedUntil: 0, frozenUntil: 0
      };
    }
    function getMyProfile() { return getProfile(deviceId); }
    function getDisplayName(id, fallback = '') { return getProfile(id).name || fallback || 'user'; }
    function getDisplayColor(profile) {
      if ((profile.name || '').toLowerCase() === 'cruz') return '#ff3131';
      return profile.color || colorForName(profile.name || 'user');
    }
    function isMuted(profile) { return Number(profile.mutedUntil || 0) > Date.now(); }
    function isBanned(profile) { return Number(profile.bannedUntil || 0) > Date.now(); }
    function isFrozen(profile) { return Number(profile.frozenUntil || 0) > Date.now(); }
    function canUseAdminPanel() { return roleRank(myRole) >= roleRank('admin'); }
    function setStatus(text) { statusText.textContent = text; }

    function refreshTopBar() {
      const me = getMyProfile();
      myRole = me.role || 'member';
      roleChip.textContent = `Role: ${myRole}`;
      nameChip.textContent = `Name: ${me.name || '???'}`;
      const active = Object.values(onlineUsers).filter(v => Date.now() - (v.lastSeen || 0) < 120000);
      onlineChip.textContent = `Online: ${active.length || 1}`;
    }

    async function saveProfile(patch) {
      if (!db) return;
      const cleanPatch = { ...patch };
      if (cleanPatch.name) cleanPatch.name = normalizeName(cleanPatch.name);
      if (cleanPatch.color) cleanPatch.color = String(cleanPatch.color).slice(0, 20);
      await update(ref(db, `${DB_ROOT}/profiles/${deviceId}`), cleanPatch);
      if (cleanPatch.name) { currentName = cleanPatch.name; localStorage.setItem('funAndGamesName', currentName); }
      if (cleanPatch.color !== undefined) { currentColor = cleanPatch.color || ''; localStorage.setItem('funAndGamesColor', currentColor); }
    }

    function ensureName() {
      if (currentName) {
        nameModal.classList.add('hidden');
      } else {
        nameModal.classList.remove('hidden');
        nameInput.focus();
      }
    }

    async function saveName() {
      const cleanName = normalizeName(nameInput.value);
      if (!cleanName) { setStatus('Enter a name first.'); nameInput.focus(); return; }
      currentName = cleanName;
      localStorage.setItem('funAndGamesName', cleanName);
      nameModal.classList.add('hidden');
      if (db) await saveProfile({ name: cleanName });
      refreshTopBar();
      setStatus(`Connected as ${cleanName}.`);
      messageInput.focus();
    }

    function appendSystemMessage(text, id = `sys-${crypto.randomUUID()}`) {
      if (messagesSeen.has(id)) return;
      messagesSeen.add(id);
      const row = document.createElement('p');
      row.className = 'system-message';
      row.textContent = text;
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function clearMenus() {
      document.querySelectorAll('.options-menu').forEach(el => el.remove());
    }
    document.addEventListener('click', event => {
      if (!event.target.closest('.message-actions')) clearMenus();
    });

    function canActOnTarget(targetRole) {
      return roleRank(myRole) > roleRank(targetRole);
    }

    function allowedRoleTargets() {
      if (myRole === 'owner') return SELECTABLE_ROLES;
      if (myRole === 'admin') return ['member', 'helper', 'mod'];
      return [];
    }

    async function setTargetRole(targetId, role) {
      const target = getProfile(targetId);
      if (!allowedRoleTargets().includes(role)) return setStatus('You cannot assign that role.');
      if (target.role === 'owner') return setStatus('You cannot change the owner.');
      if (myRole === 'admin' && roleRank(target.role) >= roleRank('admin')) return setStatus('Admins cannot change admins.');
      if (!canActOnTarget(target.role)) return setStatus('That role is too high.');
      await update(ref(db, `${DB_ROOT}/profiles/${targetId}`), { role });
      setStatus(`${target.name} is now ${role}.`);
      appendSystemMessage(`${target.name} is now ${role}.`);
    }

    function buildMenuButton(label, fn) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = label;
      btn.addEventListener('click', async () => {
        clearMenus();
        try { await fn(); } catch (error) { console.error(error); setStatus('That action failed.'); }
      });
      return btn;
    }

    function openOptionsMenu(wrapper, message) {
      clearMenus();
      const target = getProfile(message.authorId);
      const menu = document.createElement('div');
      menu.className = 'options-menu';
      const mine = message.authorId === deviceId;
      const canManage = canUseAdminPanel() && canActOnTarget(target.role);

      if (mine || canManage) {
        menu.appendChild(buildMenuButton('Delete message', async () => {
          await remove(ref(db, `${DB_ROOT}/messages/${message.id}`));
          setStatus('Message deleted.');
        }));
      }

      if (mine || canManage) {
        menu.appendChild(buildMenuButton('Edit message', async () => {
          const nextText = prompt('Edit message:', message.text);
          const clean = sanitizeMessage(nextText || '');
          if (!clean) return;
          await update(ref(db, `${DB_ROOT}/messages/${message.id}`), { text: clean, edited: true });
          setStatus('Message edited.');
        }));
      }

      if (mine || canManage) {
        menu.appendChild(buildMenuButton('Change name color', async () => {
          const nextColor = prompt('Name color (red, blue, #ff00aa, etc):', target.color || getDisplayColor(target));
          if (!nextColor) return;
          await update(ref(db, `${DB_ROOT}/profiles/${message.authorId}`), { color: nextColor.trim() });
          setStatus('Name color changed.');
        }));
      }

      if (canManage) {
        menu.appendChild(buildMenuButton('Rename user', async () => {
          const nextName = normalizeName(prompt('New name:', target.name || 'user') || '');
          if (!nextName) return;
          await update(ref(db, `${DB_ROOT}/profiles/${message.authorId}`), { name: nextName });
          setStatus('User renamed.');
        }));

        menu.appendChild(buildMenuButton('Select role', async () => {
          const allowed = allowedRoleTargets();
          const nextRole = (prompt(`Role (${allowed.join(', ')})`, target.role || 'member') || '').trim().toLowerCase();
          if (!allowed.includes(nextRole)) return setStatus('Invalid or blocked role.');
          await setTargetRole(message.authorId, nextRole);
        }));

        menu.appendChild(buildMenuButton('Mute 1 hour', async () => {
          if (roleRank(target.role) >= roleRank('admin')) return setStatus('Admins cannot be muted.');
          await update(ref(db, `${DB_ROOT}/profiles/${message.authorId}`), { mutedUntil: Date.now() + 3600000 });
          setStatus('User muted for an hour.');
        }));

        menu.appendChild(buildMenuButton('Timeout 3 minutes', async () => {
          if (roleRank(target.role) >= roleRank('admin')) return setStatus('Admins cannot be timed out.');
          await update(ref(db, `${DB_ROOT}/profiles/${message.authorId}`), { mutedUntil: Date.now() + 180000, frozenUntil: Date.now() + 180000 });
          setStatus('User timed out for 3 minutes.');
        }));

        menu.appendChild(buildMenuButton('Ban 1 hour', async () => {
          if (roleRank(target.role) >= roleRank('admin')) return setStatus('Admins cannot be banned.');
          await update(ref(db, `${DB_ROOT}/profiles/${message.authorId}`), { bannedUntil: Date.now() + 3600000 });
          setStatus('User banned for an hour.');
        }));

        menu.appendChild(buildMenuButton('Unban / Unmute', async () => {
          if (roleRank(target.role) >= roleRank('admin')) return setStatus('Admins cannot be changed here.');
          await update(ref(db, `${DB_ROOT}/profiles/${message.authorId}`), { bannedUntil: 0, mutedUntil: 0, frozenUntil: 0 });
          setStatus('User unbanned and unmuted.');
        }));
      }

      if (!menu.children.length) return;
      wrapper.appendChild(menu);
    }

    function buildMessageRow(message) {
      const profile = getProfile(message.authorId);
      const row = document.createElement('div');
      row.className = 'message';

      const main = document.createElement('div');
      main.className = 'message-main';

      const badge = roleBadge(profile.role);
      if (badge) {
        const badgeSpan = document.createElement('span');
        badgeSpan.className = 'badge';
        badgeSpan.textContent = badge;
        main.appendChild(badgeSpan);
      }

      const nameSpan = document.createElement('span');
      nameSpan.className = 'name';
      nameSpan.textContent = profile.name || message.name || 'user';
      nameSpan.style.color = getDisplayColor(profile);
      main.appendChild(nameSpan);

      const bodySpan = document.createElement('span');
      bodySpan.className = 'msg-body';
      bodySpan.innerHTML = escapeHtml(message.text || '');
      main.appendChild(bodySpan);

      const notes = [];
      if (message.edited) notes.push('edited');
      if (profile.bio) notes.push(profile.bio);
      if (notes.length) {
        const note = document.createElement('span');
        note.className = 'meta-note';
        note.textContent = notes.join(' • ');
        main.appendChild(note);
      }

      row.appendChild(main);

      const showActions = message.authorId === deviceId || (canUseAdminPanel() && canActOnTarget(profile.role));
      if (showActions) {
        const actions = document.createElement('div');
        actions.className = 'message-actions';
        const btn = document.createElement('button');
        btn.className = 'options-btn';
        btn.type = 'button';
        btn.textContent = '⋯';
        btn.addEventListener('click', event => {
          event.stopPropagation();
          openOptionsMenu(actions, message);
        });
        actions.appendChild(btn);
        row.appendChild(actions);
      }
      return row;
    }

    function appendMessage(message, id) {
      if (messagesSeen.has(id)) return;
      messagesSeen.add(id);
      message.id = id;
      messagesEl.appendChild(buildMessageRow(message));
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function refreshMessageList() {
      if (!db) return;
      const snap = await get(query(ref(db, `${DB_ROOT}/messages`), limitToLast(150)));
      messagesEl.innerHTML = '';
      messagesSeen = new Set();
      if (!snap.exists()) return;
      const value = snap.val();
      Object.entries(value).sort((a,b) => (a[1].createdAt || 0) - (b[1].createdAt || 0)).forEach(([id, msg]) => appendMessage(msg, id));
    }

    function myCanSpeak() {
      const me = getMyProfile();
      if (systemState.shutdown) return 'Chat is shut down right now.';
      if (systemState.locked && roleRank(myRole) < roleRank('admin')) return 'Chat is locked right now.';
      if (isBanned(me)) return `You are banned for ${Math.ceil((me.bannedUntil - Date.now()) / 60000)} more minute(s).`;
      if (isMuted(me)) return `You are muted for ${Math.ceil((me.mutedUntil - Date.now()) / 60000)} more minute(s).`;
      if (isFrozen(me)) return `You are frozen for ${Math.ceil((me.frozenUntil - Date.now()) / 60000)} more minute(s).`;
      const waitMs = (Number(systemState.slowmodeSeconds || 0) * 1000) - (Date.now() - lastSentAt);
      if (waitMs > 0 && roleRank(myRole) < roleRank('admin')) return `Slowmode: wait ${Math.ceil(waitMs / 1000)} second(s).`;
      return '';
    }

    async function sendChatMessage(text, extra = {}) {
      const reason = myCanSpeak();
      if (reason) return setStatus(reason);
      const payload = {
        authorId: deviceId,
        name: getMyProfile().name || currentName,
        text,
        createdAt: Date.now(),
        createdAtServer: serverTimestamp(),
        ...extra
      };
      await push(ref(db, `${DB_ROOT}/messages`), payload);
      lastSentAt = Date.now();
      messageInput.value = '';
      setStatus('Message sent.');
    }

    async function executeCommand(rawText) {
      const input = rawText.trim();
      const lower = input.toLowerCase();

      if (input === '/Cruz10312') {
        ownerUnlocked = true;
        adminUnlocked = false;
        await saveProfile({ role: 'owner' });
        appendSystemMessage('Owner mode enabled on this device.');
        return true;
      }
      if (input === '/Stewie25') {
        if (!ownerUnlocked) {
          adminUnlocked = true;
          await saveProfile({ role: 'admin' });
          appendSystemMessage('Admin mode enabled on this device.');
        }
        return true;
      }

      if (!input.startsWith('/')) return false;

      const [command, ...rest] = input.split(' ');
      const argText = rest.join(' ').trim();
      const me = getMyProfile();
      const isAdminPlus = roleRank(myRole) >= roleRank('admin');
      const isOwner = myRole === 'owner';

      const findUserByName = (name) => {
        const wanted = normalizeName(name).toLowerCase();
        return Object.entries(profiles).find(([, profile]) => (profile.name || '').toLowerCase() === wanted);
      };

      const time1h = Date.now() + 3600000;

      switch (command.toLowerCase()) {
        case '/rename': {
          if (!argText) { setStatus('Use /rename NewName'); return true; }
          await saveProfile({ name: argText });
          refreshTopBar();
          setStatus('Name changed.');
          return true;
        }
        case '/nick': {
          if (!argText) { setStatus('Use /nick NewName'); return true; }
          await saveProfile({ name: argText });
          setStatus('Nickname changed.');
          return true;
        }
        case '/color': {
          if (!argText) { setStatus('Use /color red or /color #ff0000'); return true; }
          await saveProfile({ color: argText });
          setStatus('Color changed.');
          return true;
        }
        case '/bio': {
          await saveProfile({ bio: argText.slice(0, 60) });
          setStatus('Bio updated.');
          return true;
        }
        case '/me': {
          if (!argText) return true;
          await sendChatMessage(`*${getMyProfile().name} ${argText}*`, { type: 'action' });
          return true;
        }
        case '/roll': {
          const roll = Math.floor(Math.random() * 6) + 1;
          await sendChatMessage(`🎲 ${getMyProfile().name} rolled ${roll}`);
          return true;
        }
        case '/flip': {
          const side = Math.random() < 0.5 ? 'Heads' : 'Tails';
          await sendChatMessage(`🪙 ${side}`);
          return true;
        }
        case '/shrug': {
          await sendChatMessage('¯\\_(ツ)_/¯');
          return true;
        }
        case '/ghost': {
          if (!argText) return true;
          await push(ref(db, `${DB_ROOT}/messages`), {
            authorId: deviceId,
            name: 'Anonymous',
            text: `👻 Anonymous: ${argText}`,
            ghost: true,
            createdAt: Date.now(),
            createdAtServer: serverTimestamp()
          });
          setStatus('Ghost message sent.');
          return true;
        }
        case '/who': {
          const names = Object.values(onlineUsers).filter(v => Date.now() - (v.lastSeen || 0) < 120000).map(v => v.name || 'user');
          appendSystemMessage(`Online: ${names.join(', ') || 'just you'}`);
          return true;
        }
        case '/admins': {
          const names = Object.values(profiles).filter(v => roleRank(v.role) >= roleRank('admin')).map(v => v.name || 'user');
          appendSystemMessage(`Admins: ${names.join(', ') || 'none'}`);
          return true;
        }
        case '/ping': {
          appendSystemMessage(`Ping: ${Math.floor(Math.random() * 35) + 20}ms`);
          return true;
        }
        case '/warn':
        case '/kick':
        case '/mute':
        case '/ban':
        case '/freeze':
        case '/unfreeze': {
          if (!isAdminPlus) { setStatus('You need admin for that.'); return true; }
          const found = findUserByName(argText);
          if (!found) { setStatus('User not found.'); return true; }
          const [targetId, target] = found;
          if (!canActOnTarget(target.role)) { setStatus('That user is too high.'); return true; }
          if (roleRank(target.role) >= roleRank('admin') && ['/mute','/ban'].includes(command.toLowerCase())) {
            setStatus('Admins cannot be muted or banned.');
            return true;
          }
          if (command.toLowerCase() === '/warn') { appendSystemMessage(`⚠️ ${target.name} was warned.`); return true; }
          if (command.toLowerCase() === '/kick') { await update(ref(db, `${DB_ROOT}/profiles/${targetId}`), { frozenUntil: Date.now() + 15000 }); appendSystemMessage(`${target.name} was kicked for a few seconds.`); return true; }
          if (command.toLowerCase() === '/mute') { await update(ref(db, `${DB_ROOT}/profiles/${targetId}`), { mutedUntil: time1h }); appendSystemMessage(`${target.name} was muted for 1 hour.`); return true; }
          if (command.toLowerCase() === '/ban') { await update(ref(db, `${DB_ROOT}/profiles/${targetId}`), { bannedUntil: time1h }); appendSystemMessage(`${target.name} was banned for 1 hour.`); return true; }
          if (command.toLowerCase() === '/freeze') { await update(ref(db, `${DB_ROOT}/profiles/${targetId}`), { frozenUntil: time1h }); appendSystemMessage(`${target.name} was frozen for 1 hour.`); return true; }
          if (command.toLowerCase() === '/unfreeze') { await update(ref(db, `${DB_ROOT}/profiles/${targetId}`), { frozenUntil: 0 }); appendSystemMessage(`${target.name} was unfrozen.`); return true; }
          return true;
        }
        case '/clear': {
          if (!isAdminPlus) { setStatus('You need admin for that.'); return true; }
          await remove(ref(db, `${DB_ROOT}/messages`));
          messagesEl.innerHTML = '';
          messagesSeen = new Set();
          appendSystemMessage('Chat cleared.');
          return true;
        }
        case '/purge': {
          if (!isOwner) { setStatus('Only owner can purge.'); return true; }
          const count = Math.max(1, Math.min(200, Number(argText) || 1));
          const snap = await get(query(ref(db, `${DB_ROOT}/messages`), limitToLast(count)));
          if (snap.exists()) {
            const value = snap.val();
            await Promise.all(Object.keys(value).map(id => remove(ref(db, `${DB_ROOT}/messages/${id}`))));
          }
          appendSystemMessage(`Purged ${count} message(s).`);
          return true;
        }
        case '/slowmode': {
          if (!isAdminPlus) { setStatus('You need admin for that.'); return true; }
          const seconds = Math.max(0, Math.min(300, Number(argText) || 0));
          await update(ref(db, `${DB_ROOT}/system`), { slowmodeSeconds: seconds });
          appendSystemMessage(`Slowmode set to ${seconds} second(s).`);
          return true;
        }
        case '/lock': {
          if (!isAdminPlus) { setStatus('You need admin for that.'); return true; }
          await update(ref(db, `${DB_ROOT}/system`), { locked: true });
          appendSystemMessage('Chat locked.');
          return true;
        }
        case '/unlock': {
          if (!isAdminPlus) { setStatus('You need admin for that.'); return true; }
          await update(ref(db, `${DB_ROOT}/system`), { locked: false });
          appendSystemMessage('Chat unlocked.');
          return true;
        }
        case '/broadcast': {
          if (!isOwner) { setStatus('Only owner can broadcast.'); return true; }
          if (!argText) return true;
          await push(ref(db, `${DB_ROOT}/messages`), {
            authorId: deviceId,
            name: getMyProfile().name,
            text: `📣 ${argText}`,
            broadcast: true,
            createdAt: Date.now(),
            createdAtServer: serverTimestamp()
          });
          setStatus('Broadcast sent.');
          return true;
        }
        case '/shutdown': {
          if (!isOwner) { setStatus('Only owner can shutdown.'); return true; }
          await update(ref(db, `${DB_ROOT}/system`), { shutdown: !systemState.shutdown });
          appendSystemMessage(`Shutdown ${!systemState.shutdown ? 'enabled' : 'disabled'}.`);
          return true;
        }
        default:
          return false;
      }
    }

    async function setupFirebaseChat() {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      messagesDbRef = ref(db, `${DB_ROOT}/messages`);

      if (!currentName) currentName = localStorage.getItem('funAndGamesName') || '';
      if (!currentColor) currentColor = localStorage.getItem('funAndGamesColor') || '';

      await set(ref(db, `${DB_ROOT}/profiles/${deviceId}`), {
        name: currentName || 'guest',
        color: currentColor || '',
        role: ownerUnlocked ? 'owner' : adminUnlocked ? 'admin' : 'member',
        bio: getMyProfile().bio || '',
        bannedUntil: getMyProfile().bannedUntil || 0,
        mutedUntil: getMyProfile().mutedUntil || 0,
        frozenUntil: getMyProfile().frozenUntil || 0,
        lastSeen: Date.now()
      });

      const presenceRef = ref(db, `${DB_ROOT}/presence/${deviceId}`);
      await set(presenceRef, { name: currentName || 'guest', role: myRole, lastSeen: Date.now() });
      onDisconnect(presenceRef).remove();
      setInterval(() => set(presenceRef, { name: getMyProfile().name || currentName || 'guest', role: myRole, lastSeen: Date.now() }), 30000);

      onValue(ref(db, `${DB_ROOT}/profiles`), snapshot => {
        profiles = snapshot.val() || {};
        const me = getMyProfile();
        myRole = me.role || 'member';
        refreshTopBar();
        refreshMessageList();
      });

      onValue(ref(db, `${DB_ROOT}/presence`), snapshot => {
        onlineUsers = snapshot.val() || {};
        refreshTopBar();
      });

      onValue(ref(db, `${DB_ROOT}/system`), snapshot => {
        systemState = { slowmodeSeconds: 0, locked: false, shutdown: false, ...(snapshot.val() || {}) };
      });

      onValue(query(ref(db, `${DB_ROOT}/messages`), limitToLast(150)), snapshot => {
        messagesEl.innerHTML = '';
        messagesSeen = new Set();
        const data = snapshot.val() || {};
        Object.entries(data).sort((a,b) => (a[1].createdAt || 0) - (b[1].createdAt || 0)).forEach(([id, value]) => appendMessage(value, id));
      });

      setStatus(currentName ? `Connected as ${currentName}.` : 'Connected. Enter your name to chat.');
    }

    confirmNameBtn.addEventListener('click', () => { saveName().catch(console.error); });
    closeModalBtn.addEventListener('click', () => { nameInput.value = currentName; ensureName(); });
    nameInput.addEventListener('keydown', event => { if (event.key === 'Enter') { event.preventDefault(); saveName().catch(console.error); } });
    changeNameBtn.addEventListener('click', () => { nameInput.value = currentName; nameModal.classList.remove('hidden'); nameInput.focus(); });
    changeColorBtn.addEventListener('click', async () => {
      const nextColor = prompt('Pick a color for your name', getMyProfile().color || getDisplayColor(getMyProfile()));
      if (!nextColor) return;
      await saveProfile({ color: nextColor.trim() });
      setStatus('Your color changed.');
    });

    composerForm.addEventListener('submit', async event => {
      event.preventDefault();
      if (!currentName) { ensureName(); setStatus('Pick a name first.'); return; }
      const text = sanitizeMessage(messageInput.value);
      if (!text) return;
      const handled = await executeCommand(text);
      if (handled) { messageInput.value = ''; return; }
      if (containsBlockedTerm(text)) { setStatus('That message was blocked by the chat filter.'); return; }
      await sendChatMessage(text);
    });

    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) await appRoot.requestFullscreen();
        else await document.exitFullscreen();
      } catch (error) {
        console.error(error);
        setStatus('Fullscreen did not open on this browser.');
      }
    });

    if (currentName) nameInput.value = currentName;
    ensureName();
    setupFirebaseChat().catch(error => {
      console.error(error);
      setStatus('Could not connect to Firebase. Check your database rules.');
    });
  </script>
</body>
</html>
