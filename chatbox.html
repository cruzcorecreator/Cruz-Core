<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fun and games - chatbox</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #d8e0d4;
      --border: #7a7677;
      --white: #f1f1f1;
      --blue: #41a9ea;
      --green: #71b167;
      --dark-green: #0ac860;
      --gray-input: #8b8787;
      --shadow: rgba(0,0,0,0.18);
      --danger: #ff3131;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: #000;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 10px 22px 24px;
    }

    .site-title {
      margin: 0 0 8px;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(4rem, 8vw, 5.75rem);
      line-height: .9;
      letter-spacing: -0.06em;
      font-weight: 700;
      text-transform: lowercase;
    }

    .chat-shell {
      background: #efefef;
      border: 6px solid var(--border);
      border-radius: 42px;
      padding: 8px 18px 14px;
    }

    .chat-title {
      text-align: center;
      margin: 0 0 14px;
      font-size: clamp(2.6rem, 5vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: lowercase;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 2px 10px;
      flex-wrap: wrap;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .small-btn {
      border: 4px solid #111;
      border-radius: 999px;
      background: #fff;
      padding: 8px 14px;
      font-weight: 900;
      cursor: pointer;
      font-size: .95rem;
    }

    .small-btn.danger {
      background: #ffd5d5;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 4px solid #111;
      border-radius: 999px;
      background: #fff;
      padding: 7px 12px;
      font-weight: 900;
      font-size: .92rem;
    }

    .messages {
      height: 520px;
      overflow-y: auto;
      padding: 8px 2px 10px;
    }

    .message {
      font-size: clamp(1.05rem, 2.3vw, 1.35rem);
      line-height: 1.45;
      margin: 0 0 18px;
      word-break: break-word;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .message-main {
      min-width: 0;
      flex: 1;
    }

    .message-actions {
      position: relative;
      flex: 0 0 auto;
    }

    .options-btn {
      border: 3px solid #111;
      background: #fff;
      border-radius: 999px;
      width: 38px;
      height: 38px;
      font-weight: 900;
      cursor: pointer;
    }

    .options-menu {
      position: absolute;
      top: 44px;
      right: 0;
      min-width: 180px;
      background: #fff;
      border: 4px solid #111;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.18);
      padding: 6px;
      z-index: 50;
    }

    .options-menu button {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      font-weight: 800;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: .95rem;
    }

    .options-menu button:hover {
      background: #ececec;
    }

    .name {
      font-weight: 900;
      margin-right: 10px;
      display: inline-block;
    }

    .badge {
      display: inline-block;
      margin-right: 8px;
      font-size: .95em;
      vertical-align: baseline;
    }

    .meta-note {
      display: block;
      font-size: .72em;
      font-weight: 800;
      color: #555;
      margin-top: 3px;
    }

    .msg-body {
      color: #111;
    }

    .composer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      border: 5px solid #1f1f1f;
      border-radius: 999px;
      padding: 0 10px 0 0;
      background: var(--gray-input);
      overflow: hidden;
    }

    .composer input {
      flex: 1;
      height: 72px;
      padding: 0 22px;
      border: none;
      background: transparent;
      color: #111;
      font-size: clamp(1.3rem, 2.5vw, 1.55rem);
      font-weight: 800;
      outline: none;
    }

    .composer input::placeholder,
    .name-input::placeholder {
      color: #d6c6c6;
      opacity: 1;
    }

    .send-btn,
    .confirm-btn,
    .back-btn,
    .close-btn {
      border: 5px solid #111;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #000;
    }

    .send-btn {
      flex: 0 0 auto;
      width: 112px;
      height: 58px;
      border-radius: 999px;
      background: var(--dark-green);
      font-size: 1.1rem;
    }

    .bottom-panel {
      margin-top: 10px;
      background: var(--green);
      border: 6px solid var(--border);
      border-radius: 42px;
      padding: 24px 46px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .bottom-left h2 {
      margin: 0 0 8px;
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: lowercase;
    }

    .bottom-left p {
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      font-weight: 800;
      line-height: 1.3;
    }

    .fullscreen-btn {
      flex: 0 0 auto;
      width: 74px;
      height: 74px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .fullscreen-btn svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.56);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal {
      position: relative;
      width: min(720px, 100%);
      background: var(--blue);
      border: 6px solid var(--border);
      border-radius: 42px;
      padding: 22px 28px 40px;
      box-shadow: 0 24px 60px var(--shadow);
      text-align: center;
    }

    .modal-title {
      margin: 0 0 50px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.3rem, 7vw, 5rem);
      line-height: .9;
      letter-spacing: -0.05em;
      font-weight: 700;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 126px;
      height: 108px;
      border-radius: 38px;
      border-color: transparent;
      background: #ff3131;
      font-size: 3.2rem;
      line-height: 1;
    }

    .name-input-wrap {
      display: flex;
      justify-content: center;
    }

    .name-input {
      width: min(460px, 100%);
      height: 64px;
      border: 4px solid #111;
      border-radius: 999px;
      background: var(--gray-input);
      color: #111;
      font-size: 1.2rem;
      font-weight: 800;
      padding: 0 18px;
      outline: none;
    }

    .confirm-btn {
      margin-top: 42px;
      width: 172px;
      height: 72px;
      border-radius: 999px;
      background: var(--dark-green);
      font-size: 1.15rem;
    }

    .status {
      margin: 10px 4px 0;
      font-size: .95rem;
      font-weight: 800;
      color: #1d1d1d;
      min-height: 1.2em;
    }

    .hidden { display: none !important; }

    @media (max-width: 820px) {
      .page { padding: 16px 12px 18px; }
      .messages { height: 420px; }
      .bottom-panel { padding: 20px 22px 14px; }
      .close-btn { width: 92px; height: 88px; border-radius: 28px; font-size: 2.6rem; }
    }

    @media (max-width: 620px) {
      .messages { height: 360px; }
      .composer input { height: 62px; }
      .send-btn { width: 92px; height: 52px; }
      .bottom-panel { flex-direction: row; align-items: center; }
      .bottom-left h2 { font-size: 2.4rem; }
      .bottom-left p { font-size: .96rem; }
      .toolbar { align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="page" id="appRoot">
    <h1 class="site-title">fun and games</h1>

    <section class="chat-shell" id="chatShell">
      <h2 class="chat-title">chatbox</h2>

      <div class="toolbar">
        <div class="toolbar-left">
          <button class="small-btn" id="changeNameBtn" type="button">Change Name</button>
          <div class="chip" id="identityChip">Not connected</div>
        </div>
        <div class="toolbar-right">
          <button class="small-btn danger hidden" id="clearMuteBtn" type="button">Clear Local Mute/Ban</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <form class="composer" id="composerForm" autocomplete="off">
        <input id="messageInput" type="text" maxlength="300" placeholder="Type something!" />
        <button class="send-btn" type="submit">Send</button>
      </form>
      <div class="status" id="statusText"></div>
    </section>

    <section class="bottom-panel">
      <div class="bottom-left">
        <h2>chatbox</h2>
        <p>my chat filter can detect when you are saying words you arent supposed to. be cautious of what you say.</p>
      </div>
      <button class="fullscreen-btn" id="fullscreenBtn" aria-label="Toggle fullscreen">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 24V10H24" stroke="#222" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M40 10H54V24" stroke="#222" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M54 40V54H40" stroke="#222" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M24 54H10V40" stroke="#222" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </section>
  </div>

  <div class="modal-backdrop" id="nameModal">
    <div class="modal">
      <button class="close-btn" id="closeModalBtn" type="button">X</button>
      <h2 class="modal-title">Chatbox</h2>
      <div class="name-input-wrap">
        <input class="name-input" id="nameInput" type="text" maxlength="20" placeholder="Name" />
      </div>
      <button class="confirm-btn" id="confirmNameBtn" type="button">Confirm</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import { getAnalytics } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js';
    import {
      getDatabase,
      ref,
      push,
      set,
      update,
      remove,
      get,
      onChildAdded,
      onChildChanged,
      onChildRemoved,
      onValue,
      query,
      orderByChild,
      equalTo,
      limitToLast,
      serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyDvKpZacWOgca6PtoA6wP2QFX3JbI-Dvw4',
      authDomain: 'funandgames-4e8c1.firebaseapp.com',
      databaseURL: 'https://funandgames-4e8c1-default-rtdb.firebaseio.com',
      projectId: 'funandgames-4e8c1',
      storageBucket: 'funandgames-4e8c1.firebasestorage.app',
      messagingSenderId: '240713956788',
      appId: '1:240713956788:web:37b64a7a534f1e2bea06e1',
      measurementId: 'G-KLSV3Q73MR'
    };

    const ADMIN_PASSWORDS = ['/Cruz10312', '/Stewie25'];
    const RED_NAMES = ['cruz'];
    const blockedTerms = [
      'nigger','faggot','kike','spic','retard','rape','rapist','kill yourself','kys','suicide','porn','sex','cum','dick','pussy','bitch','slut','whore'
    ];
    const nameColors = ['#7b54ff', '#0fc15e', '#3576ff', '#ff7a00', '#d133ff', '#00a6a6'];

    const messagesEl = document.getElementById('messages');
    const composerForm = document.getElementById('composerForm');
    const messageInput = document.getElementById('messageInput');
    const statusText = document.getElementById('statusText');
    const nameModal = document.getElementById('nameModal');
    const nameInput = document.getElementById('nameInput');
    const confirmNameBtn = document.getElementById('confirmNameBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const appRoot = document.getElementById('appRoot');
    const changeNameBtn = document.getElementById('changeNameBtn');
    const identityChip = document.getElementById('identityChip');
    const clearMuteBtn = document.getElementById('clearMuteBtn');

    const app = initializeApp(firebaseConfig);
    try { getAnalytics(app); } catch (error) { console.warn('Analytics unavailable on this page.', error); }
    const db = getDatabase(app);

    const CHAT_ROOT = 'fun-and-games-chat';
    const messagesRootRef = ref(db, `${CHAT_ROOT}/messages`);
    const profilesRootRef = ref(db, `${CHAT_ROOT}/profiles`);
    const bansRootRef = ref(db, `${CHAT_ROOT}/bans`);
    const mutesRootRef = ref(db, `${CHAT_ROOT}/mutes`);
    const adminsRootRef = ref(db, `${CHAT_ROOT}/admins`);

    const deviceId = localStorage.getItem('funAndGamesDeviceId') || crypto.randomUUID();
    localStorage.setItem('funAndGamesDeviceId', deviceId);

    let currentName = localStorage.getItem('funAndGamesName') || '';
    let currentColor = localStorage.getItem('funAndGamesColor') || '';
    let currentRole = localStorage.getItem('funAndGamesRole') || 'member';
    let isLocalUnlockedAdmin = localStorage.getItem('funAndGamesUnlockedAdmin') === 'true';
    let forcedProfile = null;
    let activeBan = null;
    let activeMute = null;
    const seenIds = new Set();
    const messageNodes = new Map();
    const messageCache = new Map();
    const profileCache = new Map();
    const activeMenus = new Set();

    function normalizeName(name) {
      return name.replace(/\s+/g, ' ').trim().slice(0, 20);
    }

    function sanitizeMessage(text) {
      return text.replace(/\s+/g, ' ').trim().slice(0, 300);
    }

    function containsBlockedTerm(text) {
      const lower = text.toLowerCase();
      return blockedTerms.some(term => lower.includes(term));
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function colorForName(name) {
      if (RED_NAMES.includes((name || '').trim().toLowerCase())) return '#ff3131';
      let hash = 0;
      for (let i = 0; i < name.length; i += 1) hash = ((hash << 5) - hash) + name.charCodeAt(i);
      return nameColors[Math.abs(hash) % nameColors.length];
    }

    function defaultProfile(name = currentName) {
      return {
        name,
        color: currentColor || colorForName(name),
        role: 'member'
      };
    }

    function getOwnEffectiveRole() {
      if (isLocalUnlockedAdmin) return 'admin';
      if (currentRole === 'admin') return 'admin';
      return 'member';
    }

    function isAdmin() {
      return getOwnEffectiveRole() === 'admin';
    }

    function isNameRed(name) {
      return RED_NAMES.includes((name || '').trim().toLowerCase());
    }

    function getDisplayProfile(deviceKey, fallbackName = 'unknown') {
      const profile = profileCache.get(deviceKey) || {};
      const effectiveName = profile.forcedName || profile.name || fallbackName;
      const effectiveRole = profile.role || 'member';
      const effectiveColor = isNameRed(effectiveName)
        ? '#ff3131'
        : (profile.color || colorForName(effectiveName));
      return {
        name: effectiveName,
        color: effectiveColor,
        role: effectiveRole
      };
    }

    function getRemainingText(until) {
      const ms = Number(until) - Date.now();
      if (ms <= 0) return 'expired';
      const mins = Math.ceil(ms / 60000);
      if (mins >= 60) {
        const hours = Math.floor(mins / 60);
        const rest = mins % 60;
        return `${hours}h ${rest}m`;
      }
      return `${mins}m`;
    }

    function updateIdentityChip() {
      const roleText = isAdmin() ? 'Admin 👑' : 'Member';
      const mutedText = activeMute && Number(activeMute.until) > Date.now() ? ` • muted ${getRemainingText(activeMute.until)}` : '';
      const bannedText = activeBan && Number(activeBan.until) > Date.now() ? ` • banned ${getRemainingText(activeBan.until)}` : '';
      identityChip.textContent = `${currentName || 'No name'} • ${roleText}${mutedText}${bannedText}`;
      clearMuteBtn.classList.toggle('hidden', !(activeBan || activeMute));
    }

    function setStatus(text) {
      statusText.textContent = text;
      updateIdentityChip();
    }

    async function saveOwnProfile() {
      if (!currentName) return;
      const ownProfile = {
        name: currentName,
        color: isNameRed(currentName) ? '#ff3131' : (currentColor || colorForName(currentName)),
        role: currentRole || 'member',
        updatedAt: Date.now(),
        lastSeenAt: Date.now()
      };
      await update(ref(db, `${CHAT_ROOT}/profiles/${deviceId}`), ownProfile);
      profileCache.set(deviceId, ownProfile);
      currentColor = ownProfile.color;
      localStorage.setItem('funAndGamesColor', currentColor);
      updateIdentityChip();
    }

    function ensureNameModal(openForRename = false) {
      if (currentName && !openForRename) {
        nameModal.classList.add('hidden');
      } else {
        nameModal.classList.remove('hidden');
        nameInput.value = currentName;
        nameInput.focus();
        nameInput.select();
      }
    }

    async function saveName() {
      const cleanName = normalizeName(nameInput.value);
      if (!cleanName) {
        setStatus('Enter a name first.');
        nameInput.focus();
        return;
      }
      currentName = cleanName;
      currentColor = isNameRed(currentName) ? '#ff3131' : colorForName(currentName);
      localStorage.setItem('funAndGamesName', currentName);
      localStorage.setItem('funAndGamesColor', currentColor);
      nameModal.classList.add('hidden');
      await saveOwnProfile();
      setStatus(`Connected as ${currentName}.`);
      messageInput.focus();
    }

    function closeAllMenus() {
      activeMenus.forEach(menu => menu.remove());
      activeMenus.clear();
    }

    document.addEventListener('click', event => {
      if (!event.target.closest('.message-actions')) closeAllMenus();
    });

    function formatMessageHtml(message) {
      const display = getDisplayProfile(message.deviceId, message.name || 'unknown');
      const badge = display.role === 'admin' ? '<span class="badge">👑</span>' : '';
      const edited = message.editedAt ? '<span class="meta-note">edited</span>' : '';
      return {
        nameHtml: `${badge}${escapeHtml(display.name)}`,
        bodyHtml: `${escapeHtml(message.text)}${edited}`,
        color: display.color,
        role: display.role
      };
    }

    function canModerateMessage(message) {
      return isAdmin() || message.deviceId === deviceId;
    }

    function rebuildMessageElement(key) {
      const row = messageNodes.get(key);
      const message = messageCache.get(key);
      if (!row || !message) return;

      const nameSpan = row.querySelector('.name');
      const bodySpan = row.querySelector('.msg-body');
      const actions = row.querySelector('.message-actions');
      const rendered = formatMessageHtml(message);

      nameSpan.innerHTML = rendered.nameHtml;
      nameSpan.style.color = rendered.color;
      bodySpan.innerHTML = rendered.bodyHtml;
      actions.innerHTML = '';

      if (canModerateMessage(message)) {
        const btn = document.createElement('button');
        btn.className = 'options-btn';
        btn.type = 'button';
        btn.textContent = '⋯';
        btn.addEventListener('click', event => {
          event.stopPropagation();
          toggleMessageMenu(key, actions, message);
        });
        actions.appendChild(btn);
      }
    }

    function appendOrUpdateMessage(snapshotKey, message) {
      messageCache.set(snapshotKey, message);
      let row = messageNodes.get(snapshotKey);

      if (!row) {
        row = document.createElement('div');
        row.className = 'message';
        row.dataset.key = snapshotKey;
        row.innerHTML = `
          <div class="message-main">
            <span class="name"></span><span class="msg-body"></span>
          </div>
          <div class="message-actions"></div>
        `;
        messagesEl.appendChild(row);
        messageNodes.set(snapshotKey, row);
      }

      rebuildMessageElement(snapshotKey);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeMessageElement(snapshotKey) {
      messageCache.delete(snapshotKey);
      const row = messageNodes.get(snapshotKey);
      if (row) row.remove();
      messageNodes.delete(snapshotKey);
    }

    async function editMessage(key) {
      const message = messageCache.get(key);
      if (!message) return;
      const nextText = prompt('Edit message:', message.text);
      if (nextText === null) return;
      const cleaned = sanitizeMessage(nextText);
      if (!cleaned) {
        setStatus('Message edit cancelled.');
        return;
      }
      await update(ref(db, `${CHAT_ROOT}/messages/${key}`), {
        text: cleaned,
        editedAt: Date.now()
      });
      setStatus('Message updated.');
    }

    async function deleteMessage(key) {
      await remove(ref(db, `${CHAT_ROOT}/messages/${key}`));
      setStatus('Message deleted.');
    }

    async function adminSender(message) {
      await update(ref(db, `${CHAT_ROOT}/profiles/${message.deviceId}`), {
        role: 'admin',
        updatedAt: Date.now()
      });
      setStatus('That user is now an admin.');
    }

    async function changeSenderColor(message) {
      const nextColor = prompt('Enter a color like #ff0000 or blue:', getDisplayProfile(message.deviceId, message.name).color);
      if (!nextColor) return;
      await update(ref(db, `${CHAT_ROOT}/profiles/${message.deviceId}`), {
        color: nextColor.trim(),
        updatedAt: Date.now()
      });
      setStatus('Name color updated.');
    }

    async function changeSenderName(message) {
      const nextName = prompt('Rename this user to:', getDisplayProfile(message.deviceId, message.name).name);
      if (nextName === null) return;
      const cleanName = normalizeName(nextName);
      if (!cleanName) {
        setStatus('Name change cancelled.');
        return;
      }
      await update(ref(db, `${CHAT_ROOT}/profiles/${message.deviceId}`), {
        forcedName: cleanName,
        updatedAt: Date.now()
      });
      setStatus('Display name updated.');
    }

    async function banDevice(targetDeviceId, reason = '') {
      const until = Date.now() + (60 * 60 * 1000);
      await set(ref(db, `${CHAT_ROOT}/bans/${targetDeviceId}`), {
        until,
        reason,
        updatedAt: Date.now()
      });
      setStatus('Device banned for 1 hour.');
    }

    async function muteDevice(targetDeviceId, reason = '') {
      const until = Date.now() + (60 * 60 * 1000);
      await set(ref(db, `${CHAT_ROOT}/mutes/${targetDeviceId}`), {
        until,
        reason,
        updatedAt: Date.now()
      });
      setStatus('Device muted for 1 hour.');
    }

    function toggleMessageMenu(key, actionsEl, message) {
      const oldMenu = actionsEl.querySelector('.options-menu');
      closeAllMenus();
      if (oldMenu) return;

      const menu = document.createElement('div');
      menu.className = 'options-menu';

      const items = [];
      if (message.deviceId === deviceId || isAdmin()) {
        items.push(['Delete message', () => deleteMessage(key)]);
        items.push(['Edit message', () => editMessage(key)]);
      }
      if (isAdmin()) {
        items.push(['Change name color', () => changeSenderColor(message)]);
        items.push(['Rename this user', () => changeSenderName(message)]);
        items.push(['Make admin', () => adminSender(message)]);
        items.push(['Mute 1 hour', () => muteDevice(message.deviceId, `Muted by ${currentName}`)]);
        items.push(['Ban 1 hour', () => banDevice(message.deviceId, `Banned by ${currentName}`)]);
      }

      items.forEach(([label, handler]) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        btn.addEventListener('click', async () => {
          closeAllMenus();
          try {
            await handler();
          } catch (error) {
            console.error(error);
            setStatus('That action failed.');
          }
        });
        menu.appendChild(btn);
      });

      actionsEl.appendChild(menu);
      activeMenus.add(menu);
    }

    async function findLatestProfileByName(name) {
      const cleanName = normalizeName(name).toLowerCase();
      if (!cleanName) return null;

      for (const [deviceKey, profile] of profileCache.entries()) {
        const candidate = (profile.forcedName || profile.name || '').toLowerCase();
        if (candidate === cleanName) return { deviceId: deviceKey, profile };
      }

      const snapshot = await get(query(profilesRootRef, orderByChild('name'), equalTo(normalizeName(name))));
      if (!snapshot.exists()) return null;
      let found = null;
      snapshot.forEach(child => {
        if (!found) found = { deviceId: child.key, profile: child.val() };
      });
      return found;
    }

    async function processCommand(text) {
      const raw = text.trim();
      if (!raw.startsWith('/')) return false;

      if (ADMIN_PASSWORDS.includes(raw)) {
        isLocalUnlockedAdmin = true;
        localStorage.setItem('funAndGamesUnlockedAdmin', 'true');
        setStatus('Admin mode unlocked on this device.');
        return true;
      }

      const [command, ...parts] = raw.split(/\s+/);
      const lower = command.toLowerCase();

      if (lower === '/rename') {
        const nextName = normalizeName(parts.join(' '));
        if (!nextName) {
          setStatus('Use /rename NewName');
          return true;
        }
        currentName = nextName;
        currentColor = isNameRed(currentName) ? '#ff3131' : colorForName(currentName);
        localStorage.setItem('funAndGamesName', currentName);
        localStorage.setItem('funAndGamesColor', currentColor);
        await saveOwnProfile();
        setStatus(`Your name is now ${currentName}.`);
        return true;
      }

      if (!isAdmin()) {
        setStatus('That command is admin-only.');
        return true;
      }

      if (lower === '/ban' || lower === '/mute' || lower === '/admin') {
        const targetName = normalizeName(parts.join(' '));
        if (!targetName) {
          setStatus(`Use ${command} username`);
          return true;
        }
        const target = await findLatestProfileByName(targetName);
        if (!target) {
          setStatus('User not found.');
          return true;
        }
        if (lower === '/ban') {
          await banDevice(target.deviceId, `${command} by ${currentName}`);
        } else if (lower === '/mute') {
          await muteDevice(target.deviceId, `${command} by ${currentName}`);
        } else {
          await update(ref(db, `${CHAT_ROOT}/profiles/${target.deviceId}`), {
            role: 'admin',
            updatedAt: Date.now()
          });
          setStatus(`${targetName} is now an admin.`);
        }
        return true;
      }

      setStatus('Unknown command.');
      return true;
    }

    function isBanActive(record) {
      return !!(record && Number(record.until) > Date.now());
    }

    function isMuteActive(record) {
      return !!(record && Number(record.until) > Date.now());
    }

    async function sendChatMessage(text) {
      const ownProfile = getDisplayProfile(deviceId, currentName);
      await push(messagesRootRef, {
        name: ownProfile.name,
        text,
        deviceId,
        createdAt: serverTimestamp(),
        editedAt: null
      });
    }

    async function setupLiveData() {
      onChildAdded(query(messagesRootRef, limitToLast(200)), snapshot => {
        const value = snapshot.val();
        if (!value || !value.text || !value.deviceId) return;
        appendOrUpdateMessage(snapshot.key, value);
      });

      onChildChanged(messagesRootRef, snapshot => {
        const value = snapshot.val();
        if (!value) return;
        appendOrUpdateMessage(snapshot.key, value);
      });

      onChildRemoved(messagesRootRef, snapshot => {
        removeMessageElement(snapshot.key);
      });

      onValue(profilesRootRef, snapshot => {
        profileCache.clear();
        const data = snapshot.val() || {};
        Object.entries(data).forEach(([key, value]) => profileCache.set(key, value));
        if (profileCache.has(deviceId)) {
          const me = profileCache.get(deviceId);
          currentRole = me.role || 'member';
          if (me.forcedName && me.forcedName !== currentName) {
            currentName = me.forcedName;
            localStorage.setItem('funAndGamesName', currentName);
          }
          currentColor = isNameRed(currentName) ? '#ff3131' : (me.color || currentColor || colorForName(currentName));
          localStorage.setItem('funAndGamesColor', currentColor);
          localStorage.setItem('funAndGamesRole', currentRole);
        }
        messageNodes.forEach((_, key) => rebuildMessageElement(key));
        updateIdentityChip();
      });

      onValue(ref(db, `${CHAT_ROOT}/bans/${deviceId}`), snapshot => {
        const value = snapshot.val();
        activeBan = isBanActive(value) ? value : null;
        if (value && !activeBan) remove(ref(db, `${CHAT_ROOT}/bans/${deviceId}`)).catch(() => {});
        updateIdentityChip();
        if (activeBan) setStatus(`This device is banned for ${getRemainingText(activeBan.until)}.`);
      });

      onValue(ref(db, `${CHAT_ROOT}/mutes/${deviceId}`), snapshot => {
        const value = snapshot.val();
        activeMute = isMuteActive(value) ? value : null;
        if (value && !activeMute) remove(ref(db, `${CHAT_ROOT}/mutes/${deviceId}`)).catch(() => {});
        updateIdentityChip();
      });

      setStatus(currentName ? `Connected as ${currentName}.` : 'Connected. Enter your name to chat.');
    }

    confirmNameBtn.addEventListener('click', () => {
      saveName().catch(error => {
        console.error(error);
        setStatus('Could not save your name.');
      });
    });

    closeModalBtn.addEventListener('click', () => {
      if (!currentName) return;
      nameModal.classList.add('hidden');
    });

    changeNameBtn.addEventListener('click', () => ensureNameModal(true));

    nameInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        saveName().catch(error => {
          console.error(error);
          setStatus('Could not save your name.');
        });
      }
    });

    clearMuteBtn.addEventListener('click', async () => {
      try {
        await Promise.all([
          remove(ref(db, `${CHAT_ROOT}/mutes/${deviceId}`)),
          remove(ref(db, `${CHAT_ROOT}/bans/${deviceId}`))
        ]);
        activeBan = null;
        activeMute = null;
        setStatus('Local mute/ban cleared for this device.');
      } catch (error) {
        console.error(error);
        setStatus('Could not clear local mute/ban.');
      }
    });

    composerForm.addEventListener('submit', async event => {
      event.preventDefault();

      if (!currentName) {
        ensureNameModal();
        setStatus('Pick a name first.');
        return;
      }

      const text = sanitizeMessage(messageInput.value);
      if (!text) return;

      try {
        if (await processCommand(text)) {
          messageInput.value = '';
          return;
        }

        if (isBanActive(activeBan)) {
          setStatus(`This device is banned for ${getRemainingText(activeBan.until)}.`);
          return;
        }

        if (isMuteActive(activeMute)) {
          setStatus(`This device is muted for ${getRemainingText(activeMute.until)}.`);
          return;
        }

        if (containsBlockedTerm(text)) {
          setStatus('That message was blocked by the chat filter.');
          return;
        }

        await saveOwnProfile();
        await sendChatMessage(text);
        messageInput.value = '';
        setStatus('Message sent.');
      } catch (error) {
        console.error(error);
        setStatus('Could not send message right now.');
      }
    });

    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) {
          await appRoot.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.error(error);
        setStatus('Fullscreen did not open on this browser.');
      }
    });

    if (currentName) nameInput.value = currentName;
    updateIdentityChip();
    ensureNameModal();

    saveOwnProfile().catch(() => {});
    setupLiveData().catch(error => {
      console.error(error);
      setStatus('Could not start chat. Check your Firebase database rules.');
    });
  </script>
</body>
</html>
