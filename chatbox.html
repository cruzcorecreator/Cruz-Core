<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fun and games - chatbox</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #d8e0d4;
      --border: #7a7677;
      --white: #f1f1f1;
      --blue: #41a9ea;
      --green: #71b167;
      --dark-green: #0ac860;
      --gray-input: #8b8787;
      --shadow: rgba(0,0,0,0.18);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: #000;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 10px 22px 24px;
    }

    .site-title {
      margin: 0 0 8px;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(4rem, 8vw, 5.75rem);
      line-height: .9;
      letter-spacing: -0.06em;
      font-weight: 700;
      text-transform: lowercase;
    }

    .chat-shell {
      background: #efefef;
      border: 6px solid var(--border);
      border-radius: 42px;
      padding: 8px 18px 14px;
    }

    .chat-title {
      text-align: center;
      margin: 0 0 14px;
      font-size: clamp(2.6rem, 5vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: lowercase;
    }

    .messages {
      height: 520px;
      overflow-y: auto;
      padding: 8px 2px 10px;
    }

    .message {
      font-size: clamp(1.05rem, 2.3vw, 1.35rem);
      line-height: 1.45;
      margin: 0 0 22px;
      word-break: break-word;
    }

    .name {
      font-weight: 900;
      margin-right: 10px;
      display: inline-block;
    }

    .msg-body {
      color: #111;
    }

    .composer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      border: 5px solid #1f1f1f;
      border-radius: 999px;
      padding: 0 10px 0 0;
      background: var(--gray-input);
      overflow: hidden;
    }

    .composer input {
      flex: 1;
      height: 72px;
      padding: 0 22px;
      border: none;
      background: transparent;
      color: #111;
      font-size: clamp(1.3rem, 2.5vw, 1.55rem);
      font-weight: 800;
      outline: none;
    }

    .composer input::placeholder,
    .name-input::placeholder {
      color: #d6c6c6;
      opacity: 1;
    }

    .send-btn,
    .confirm-btn,
    .back-btn,
    .close-btn {
      border: 5px solid #111;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #000;
    }

    .send-btn {
      flex: 0 0 auto;
      width: 112px;
      height: 58px;
      border-radius: 999px;
      background: var(--dark-green);
      font-size: 1.1rem;
    }

    .bottom-panel {
      margin-top: 10px;
      background: var(--green);
      border: 6px solid var(--border);
      border-radius: 42px;
      padding: 24px 46px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .bottom-left h2 {
      margin: 0 0 8px;
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: lowercase;
    }

    .bottom-left p {
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      font-weight: 800;
      line-height: 1.3;
    }

    .fullscreen-btn {
      flex: 0 0 auto;
      width: 74px;
      height: 74px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .fullscreen-btn svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.56);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal {
      position: relative;
      width: min(720px, 100%);
      background: var(--blue);
      border: 6px solid var(--border);
      border-radius: 42px;
      padding: 22px 28px 40px;
      box-shadow: 0 24px 60px var(--shadow);
      text-align: center;
    }

    .modal-title {
      margin: 0 0 50px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.3rem, 7vw, 5rem);
      line-height: .9;
      letter-spacing: -0.05em;
      font-weight: 700;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 126px;
      height: 108px;
      border-radius: 38px;
      border-color: transparent;
      background: #ff3131;
      font-size: 3.2rem;
      line-height: 1;
    }

    .name-input-wrap {
      display: flex;
      justify-content: center;
    }

    .name-input {
      width: min(460px, 100%);
      height: 64px;
      border: 4px solid #111;
      border-radius: 999px;
      background: var(--gray-input);
      color: #111;
      font-size: 1.2rem;
      font-weight: 800;
      padding: 0 18px;
      outline: none;
    }

    .confirm-btn {
      margin-top: 42px;
      width: 172px;
      height: 72px;
      border-radius: 999px;
      background: var(--dark-green);
      font-size: 1.15rem;
    }

    .status {
      margin: 10px 4px 0;
      font-size: .95rem;
      font-weight: 800;
      color: #1d1d1d;
      min-height: 1.2em;
    }

    .hidden { display: none !important; }

    @media (max-width: 820px) {
      .page { padding: 16px 12px 18px; }
      .messages { height: 420px; }
      .bottom-panel { padding: 20px 22px 14px; }
      .close-btn { width: 92px; height: 88px; border-radius: 28px; font-size: 2.6rem; }
    }

    @media (max-width: 620px) {
      .messages { height: 360px; }
      .composer input { height: 62px; }
      .send-btn { width: 92px; height: 52px; }
      .bottom-panel { flex-direction: row; align-items: center; }
      .bottom-left h2 { font-size: 2.4rem; }
      .bottom-left p { font-size: .96rem; }
    }
  </style>
</head>
<body>
  <div class="page" id="appRoot">
    <h1 class="site-title">fun and games</h1>

    <section class="chat-shell" id="chatShell">
      <h2 class="chat-title">chatbox</h2>
      <div class="messages" id="messages"></div>

      <form class="composer" id="composerForm" autocomplete="off">
        <input id="messageInput" type="text" maxlength="300" placeholder="Type something!" />
        <button class="send-btn" type="submit">Send</button>
      </form>
      <div class="status" id="statusText"></div>
    </section>

    <section class="bottom-panel">
      <div class="bottom-left">
        <h2>chatbox</h2>
        <p>my chat filter can detect when you are saying words you arent supposed to. be cautious of what you say.</p>
      </div>
      <button class="fullscreen-btn" id="fullscreenBtn" aria-label="Toggle fullscreen">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 24V10H24" stroke="#222" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M40 10H54V24" stroke="#222" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M54 40V54H40" stroke="#222" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M24 54H10V40" stroke="#222" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </section>
  </div>

  <div class="modal-backdrop" id="nameModal">
    <div class="modal">
      <button class="close-btn" id="closeModalBtn" type="button">X</button>
      <h2 class="modal-title">Chatbox</h2>
      <div class="name-input-wrap">
        <input class="name-input" id="nameInput" type="text" maxlength="20" placeholder="Name" />
      </div>
      <button class="confirm-btn" id="confirmNameBtn" type="button">Confirm</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import {
      getDatabase,
      ref,
      push,
      onChildAdded,
      query,
      limitToLast,
      serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js';

    const firebaseConfig = {
      apiKey: 'PASTE_YOUR_API_KEY',
      authDomain: 'PASTE_YOUR_AUTH_DOMAIN',
      databaseURL: 'PASTE_YOUR_DATABASE_URL',
      projectId: 'PASTE_YOUR_PROJECT_ID',
      storageBucket: 'PASTE_YOUR_STORAGE_BUCKET',
      messagingSenderId: 'PASTE_YOUR_MESSAGING_SENDER_ID',
      appId: 'PASTE_YOUR_APP_ID'
    };

    const hasFirebaseConfig = Object.values(firebaseConfig).every(value => value && !String(value).startsWith('PASTE_YOUR_'));

    const fallbackMessages = [
      { name: 'placeholder', text: 'This is a placeholder chat message! Hi!' },
      { name: 'namehello', text: 'This is a placeholder chat message! Hi!' },
      { name: 'thisissomeone', text: 'This is a placeholder chat message! Hi!' },
      { name: 'placeholder', text: 'This is a placeholder chat message! Hi!' },
      { name: 'namehello', text: 'This is a placeholder chat message! Hi!' },
      { name: 'thisissomeone', text: 'This is a placeholder chat message! Hi!' },
      { name: 'placeholder', text: 'This is a placeholder chat message! Hi!' },
      { name: 'namehello', text: 'This is a placeholder chat message! Hi!' }
    ];

    const nameColors = ['#7b54ff', '#0fc15e', '#ff3b30', '#3576ff', '#ff7a00', '#d133ff'];
    const blockedTerms = [
      'nigger','faggot','kike','spic','retard','rape','rapist','kill yourself','kys','suicide','porn','sex','cum','dick','pussy','bitch','slut','whore'
    ];

    const messagesEl = document.getElementById('messages');
    const composerForm = document.getElementById('composerForm');
    const messageInput = document.getElementById('messageInput');
    const statusText = document.getElementById('statusText');
    const nameModal = document.getElementById('nameModal');
    const nameInput = document.getElementById('nameInput');
    const confirmNameBtn = document.getElementById('confirmNameBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const appRoot = document.getElementById('appRoot');

    let currentName = localStorage.getItem('funAndGamesName') || '';
    let seenIds = new Set();
    let db = null;
    let messagesRef = null;

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeName(name) {
      return name.replace(/\s+/g, ' ').trim().slice(0, 20);
    }

    function sanitizeMessage(text) {
      return text.replace(/\s+/g, ' ').trim().slice(0, 300);
    }

    function colorForName(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i += 1) hash = ((hash << 5) - hash) + name.charCodeAt(i);
      return nameColors[Math.abs(hash) % nameColors.length];
    }

    function containsBlockedTerm(text) {
      const lower = text.toLowerCase();
      return blockedTerms.some(term => lower.includes(term));
    }

    function appendMessage(data, id = crypto.randomUUID()) {
      if (seenIds.has(id)) return;
      seenIds.add(id);

      const row = document.createElement('p');
      row.className = 'message';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'name';
      nameSpan.textContent = data.name;
      nameSpan.style.color = colorForName(data.name);

      const bodySpan = document.createElement('span');
      bodySpan.className = 'msg-body';
      bodySpan.innerHTML = escapeHtml(data.text);

      row.append(nameSpan, bodySpan);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function loadFallbackMessages() {
      messagesEl.innerHTML = '';
      seenIds = new Set();
      fallbackMessages.forEach((message, index) => appendMessage(message, `fallback-${index}`));
      setStatus('Demo mode is on. Add your Firebase config in chatbox.html to make it live across computers.');
    }

    function ensureName() {
      if (currentName) {
        nameModal.classList.add('hidden');
      } else {
        nameModal.classList.remove('hidden');
        nameInput.focus();
      }
    }

    function saveName() {
      const cleanName = normalizeName(nameInput.value);
      if (!cleanName) {
        setStatus('Enter a name first.');
        nameInput.focus();
        return;
      }
      currentName = cleanName;
      localStorage.setItem('funAndGamesName', cleanName);
      nameModal.classList.add('hidden');
      setStatus(hasFirebaseConfig ? `Connected as ${cleanName}.` : `Demo mode as ${cleanName}.`);
      messageInput.focus();
    }

    async function setupFirebaseChat() {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      messagesRef = query(ref(db, 'fun-and-games-chat/messages'), limitToLast(100));

      onChildAdded(messagesRef, snapshot => {
        const value = snapshot.val();
        if (!value || !value.name || !value.text) return;
        appendMessage({ name: value.name, text: value.text }, snapshot.key);
      });

      setStatus(currentName ? `Connected as ${currentName}.` : 'Connected. Enter your name to chat.');
    }

    confirmNameBtn.addEventListener('click', saveName);
    closeModalBtn.addEventListener('click', () => {
      nameInput.value = currentName;
      ensureName();
    });

    nameInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        saveName();
      }
    });

    composerForm.addEventListener('submit', async event => {
      event.preventDefault();

      if (!currentName) {
        ensureName();
        setStatus('Pick a name first.');
        return;
      }

      const text = sanitizeMessage(messageInput.value);
      if (!text) return;

      if (containsBlockedTerm(text)) {
        setStatus('That message was blocked by the chat filter.');
        return;
      }

      const payload = { name: currentName, text };

      if (hasFirebaseConfig && db && messagesRef) {
        try {
          await push(ref(db, 'fun-and-games-chat/messages'), {
            ...payload,
            createdAt: serverTimestamp()
          });
          messageInput.value = '';
          setStatus('Message sent.');
        } catch (error) {
          console.error(error);
          setStatus('Could not send message right now.');
        }
      } else {
        appendMessage(payload);
        messageInput.value = '';
        setStatus('Demo mode only on this device. Add Firebase config for live online chat.');
      }
    });

    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) {
          await appRoot.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.error(error);
        setStatus('Fullscreen did not open on this browser.');
      }
    });

    if (currentName) nameInput.value = currentName;

    ensureName();

    if (hasFirebaseConfig) {
      setupFirebaseChat().catch(error => {
        console.error(error);
        loadFallbackMessages();
      });
    } else {
      loadFallbackMessages();
    }
  </script>
</body>
</html>
