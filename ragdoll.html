<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fun and games</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #d9e0d6;
      --border: #7a7676;
      --panel: #efefef;
      --green: #f3f3f3;
      --text: #000;
      --muted: #8a8a8a;
      --link: #1388db;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 6px 8px 28px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 26px;
    }

    .byline,
    .brand {
      margin: 0;
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.95;
      color: #000;
    }

    .byline {
      font-size: clamp(2.2rem, 2.8vw, 3.2rem);
    }

    .brand {
      font-size: clamp(3rem, 4vw, 4.9rem);
      text-transform: lowercase;
      text-align: right;
    }

    .shell {
      width: min(1060px, calc(100vw - 36px));
      margin: 0 auto;
    }

    .viewer {
      width: 100%;
      height: min(620px, 63vh);
      background: var(--panel);
      border: 7px solid var(--border);
      border-radius: 46px;
      overflow: hidden;
      position: relative;
    }

    .minecraft-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    .viewer-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.03em;
      background: #efefef;
    }

    .viewer-fallback.show {
      display: flex;
    }

    .viewer-fallback .inner {
      max-width: 620px;
    }

    .viewer-fallback a {
      color: var(--link);
    }

    .bottom-card {
      width: 100%;
      margin-top: 2px;
      background: var(--green);
      border: 7px solid var(--border);
      border-radius: 0 0 46px 46px;
      padding: 18px 26px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      position: relative;
      min-height: 136px;
    }

    .bottom-left {
      min-width: 0;
    }

    .game-title {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(2.5rem, 3vw, 3.6rem);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.05em;
      text-transform: lowercase;
    }

    .game-link {
      display: inline-block;
      margin-top: 2px;
      margin-left: 30px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(1rem, 1.3vw, 1.55rem);
      line-height: 1;
      font-weight: 800;
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .credits {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(1.2rem, 1.5vw, 2rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
      text-align: center;
    }

    .expand-btn {
      width: 88px;
      height: 88px;
      border: none;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      border-radius: 18px;
      transition: transform 0.15s ease, background 0.15s ease;
      margin-right: 6px;
    }

    .expand-btn:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.12);
    }

    .expand-btn svg {
      width: 48px;
      height: 48px;
      stroke: #111;
      stroke-width: 2.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 900px) {
      .shell {
        width: min(100%, calc(100vw - 24px));
      }

      .viewer {
        height: 56vh;
        border-radius: 34px;
      }

      .bottom-card {
        border-radius: 0 0 34px 34px;
        grid-template-columns: 1fr auto;
        padding: 16px 18px 44px;
      }

      .credits {
        font-size: 1rem;
        bottom: 10px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 10px 6px 18px;
      }

      .top {
        align-items: flex-start;
        gap: 12px;
      }

      .byline {
        max-width: 52%;
      }

      .brand {
        max-width: 44%;
      }

      .viewer {
        height: 50vh;
        border-width: 5px;
        border-radius: 26px;
      }

      .bottom-card {
        min-height: 112px;
        border-width: 5px;
        border-radius: 0 0 26px 26px;
        padding: 14px 14px 40px;
      }

      .game-link {
        margin-left: 0;
      }

      .expand-btn {
        width: 64px;
        height: 64px;
      }

      .expand-btn svg {
        width: 36px;
        height: 36px;
      }

      .credits {
        font-size: 0.86rem;
        white-space: normal;
        width: calc(100% - 20px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="top">
      <h1 class="byline">made by a genius</h1>
      <h2 class="brand">fun and games</h2>
    </header>

    <main class="shell">
      <section class="viewer" aria-label="ChatGPT window">
        <iframe id="chatgptFrame" class="minecraft-frame" src="https://freetoplayz.github.io/ragdoll-hit/" title="ChatGPT" loading="eager" referrerpolicy="no-referrer" allowfullscreen=""></iframe>

        <div class="viewer-fallback" id="fallback">
          <div class="inner">
            ChatGPT usually blocks being shown inside an embedded frame.<br><br>
            Use the fullscreen button or open
            <a href="https://chatgpt.com" target="_blank" rel="noopener noreferrer">ChatGPT directly</a>.
          </div>
        </div>
      </section>

      <section class="bottom-card" aria-label="ChatGPT info">
        <div class="bottom-left">
          <h3 class="game-title">ragdoll hit</h3>
          <a class="game-link" href="https://poki.com" target="_blank" rel="noopener noreferrer">poki</a>
        </div>

        <button class="expand-btn" id="expandBtn" type="button" aria-label="Open ChatGPT in a new tab">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 10V4h6"></path>
            <path d="M20 14v6h-6"></path>
            <path d="M10 20H4v-6"></path>
            <path d="M14 4h6v6"></path>
          </svg>
        </button>

        <div class="credits">ALL CREDITS GO TO POKI</div>
      </section>
    </main>
  </div>

  <script>
    const expandBtn = document.getElementById('expandBtn');
    const frame = document.getElementById('chatgptFrame');
    const fallback = document.getElementById('fallback');

    expandBtn.addEventListener('click', () => {
      window.open('https://chatgpt.com', '_blank', 'noopener,noreferrer');
    });

    let frameLoaded = false;

    frame.addEventListener('load', () => {
      frameLoaded = true;
    });

    setTimeout(() => {
      if (!frameLoaded) {
        fallback.classList.add('show');
      }
    }, 2500);
  </script>

</body></html>
